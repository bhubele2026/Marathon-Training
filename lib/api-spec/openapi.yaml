          nullable: true
          description: Task #373. Optional goal ending easy pace (sec/mi). When BOTH startingPaceSec and goalEndingPaceSec are set, the generator linearly interpolates easy pace from start → goal across the campaign instead of using the fixed-rate ~3.75 sec/mi/week ramp. NULL preserves the legacy fixed-rate ramp.
        dailyBudget:
          type: object
          nullable: true
          description: Optional per-runner override of the fixed-cadence daily time-budget. Canonical fields shortDayMin/shortDayMax (Tue-Thu, default 30/50) and longDayMin/longDayMax (Fri-Sun, default 60/90); Monday is always rest. Legacy weekdayMin/weekdayMax/weekendMin retained for back-compat reads. Each field capped at 180 min; route layer enforces floor <= cap per window.
          properties:
            shortDayMin: { type: integer, nullable: true, minimum: 1, maximum: 180 }
            shortDayMax: { type: integer, nullable: true, minimum: 1, maximum: 180 }
            longDayMin: { type: integer, nullable: true, minimum: 1, maximum: 180 }
            longDayMax: { type: integer, nullable: true, minimum: 1, maximum: 180 }
            weekdayMin: { type: integer, nullable: true, minimum: 1, maximum: 180 }
            weekdayMax: { type: integer, nullable: true, minimum: 1, maximum: 180 }
            weekendMin: { type: integer, nullable: true, minimum: 1, maximum: 180 }
        setActive:
          type: boolean
          nullable: true
          description: When true, mark the new config active immediately. Defaults to true if no configs exist yet, false otherwise.

    UpdatePlannerConfigBody:
      type: object
      required: [name, startDate, blocks]
      properties:
        name: { type: string }
        startDate: { type: string }
        marathonDate:
          type: string
