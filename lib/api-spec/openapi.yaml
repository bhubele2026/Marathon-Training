            weekdayMax: { type: integer, nullable: true, minimum: 1, maximum: 180 }
            weekendMin: { type: integer, nullable: true, minimum: 1, maximum: 180 }

    DuplicatePlannerConfigBody:
      type: object
      properties:
        name:
          type: string
          nullable: true
          description: Name for the duplicate. Defaults to "<original name> (copy)".

    DeletePlannerConfigResponse:
      type: object
      required: [deletedId, newActiveId]
      properties:
        deletedId: { type: integer }
        newActiveId:
          type: integer
          nullable: true
          description: id of the config promoted to active because the deleted one was active. Null when the deleted config was not active (so no promotion happened).

    UserPreferences:
      type: object
      required: [runTargetingMode, maxHr, restingHr, hrZoneModel, visualTheme, updatedAt]
      description: Single-user preferences applied across the app. Exposes the run targeting mode (Task #134) which drives how every prescribed run is displayed on Today, Week Detail, and the expanded card detail, plus the user's max heart rate (Task #141), optional resting heart rate (Task #146), chosen HR zone model (Task #158) used to compute personalized BPM ranges for the HR Zone targeting mode, and chosen visual theme palette (Task #196) so the picker on Settings persists across devices instead of being per-browser.
      properties:
        runTargetingMode:
          type: string
          enum: [effort, intervals, hr_zones, pace]
          description: |
            How prescribed runs are displayed.
              - effort     : RPE-style label like "Easy conversational" or "Hard but sustainable".
              - intervals  : walk/run recipe like "5 min run / 1 min walk × 5", scaled to the planned duration with a beginner ratio that eases over the campaign.
              - hr_zones   : heart-rate zone label like "Zone 2" (with personalized "· 134-148 bpm" range when maxHr is configured; uses Karvonen / HR-reserve when restingHr is also set).
              - pace       : the legacy explicit "9:30/mi" pace string.
            Default for new accounts is "effort".
        maxHr:
          type: integer
          nullable: true
          minimum: 80
          maximum: 230
          description: |
            User's maximum heart rate in BPM. When set, the HR Zone targeting mode
            renders BPM ranges next to each zone label (e.g. "Zone 2 · 134-148 bpm")
            using the standard % of max model. When null, the HR Zone mode falls
            back to the generic "Zone N" label. Defaults to null on new accounts.
        restingHr:
          type: integer
          nullable: true
          minimum: 30
          maximum: 110
          description: |
            User's resting heart rate in BPM (optional). When both maxHr and
            restingHr are set, the HR Zone targeting mode switches to the
            Karvonen / heart-rate-reserve formula
            (((maxHr - restingHr) * pct) + restingHr), which is meaningfully
            more accurate for fitter athletes whose resting HR is well below
            average. When null, the HR Zone math falls back to the simple
            % of max model. Defaults to null on new accounts.
        hrZoneModel:
          type: string
          enum: [five_zone_max, friel_7_zone, coggan_5_zone, polarized_3_zone]
          description: |
            Which HR zone model the user follows (Task #158). Drives the
            zone labels and percentage table the HR Zone targeting mode
            renders next to each "Zone N" line.
              - five_zone_max    : 5-zone % of max (legacy default).
              - friel_7_zone     : Joe Friel running 7-zone (% LTHR).
              - coggan_5_zone    : Coggan HR zones (% LTHR).
              - polarized_3_zone : 3-zone polarized.
            Defaults to "five_zone_max" on new accounts.
        visualTheme:
          type: string
          nullable: true
          enum: [studio, null]
          description: |
            Which visual theme palette the runner picked (Task #196). The
            five palettes match the keys in the frontend theme registry
            (`artifacts/command-center/src/lib/visual-themes.ts`). Null
            means the runner has never picked one — the provider falls
            back to localStorage and then to the arctic-performance
            default. Picking a theme on Settings writes here in addition
            to localStorage so the choice follows the runner across
            devices.
        updatedAt:
          type: string
          format: date-time

    SuggestedRestingHr:
      type: object
      required: [value, sampleCount, windowDays]
      description: |
        Server-derived resting HR suggestion based on recently logged
        workouts. The Settings page uses this to render a one-click
        "Use N bpm" affordance below the resting HR input when the user
        hasn't set one manually yet.
      properties:
        value:
          type: integer
          nullable: true
          minimum: 30
          maximum: 110
          description: Suggested resting HR in BPM, or null when there isn't enough recent HR data to make a confident suggestion.
        sampleCount:
          type: integer
          minimum: 0
          description: Number of recent workouts with an `avg_hr` value that fed into the suggestion.
        windowDays:
          type: integer
          minimum: 1
          description: Lookback window (in days) used to gather workouts for the suggestion.

    UpdateUserPreferencesBody:
      type: object
      description: |
        Partial update of UserPreferences. Omitted fields are left untouched.
        Send maxHr=null or restingHr=null to explicitly clear the configured
        value.
      properties:
        runTargetingMode:
          type: string
          enum: [effort, intervals, hr_zones, pace]
        maxHr:
          type: integer
          nullable: true
          minimum: 80
          maximum: 230
        restingHr:
          type: integer
          nullable: true
          minimum: 30
          maximum: 110
        hrZoneModel:
          type: string
          enum: [five_zone_max, friel_7_zone, coggan_5_zone, polarized_3_zone]
        visualTheme:
          type: string
          nullable: true
          enum: [studio, null]

    ApplyPlannerConfigResponse:
      type: object
      description: Result of regenerating plan_weeks and plan_days from the saved Planner config. Workouts and measurements are preserved (not wiped); reset undo snapshots are dropped because their plan_day ids no longer match.
      required:
        [
          weeksSeeded,
          daysSeeded,
          workoutsPreserved,
          measurementsPreserved,
          undoSnapshotsWiped,
          totalWeeks,
        ]
      properties:
        weeksSeeded: { type: integer }
        daysSeeded: { type: integer }
        workoutsPreserved:
          type: integer
          description: Count of logged workouts that survived the apply (i.e. were not wiped). Their plan_day_id FKs are best-effort re-pointed to the new plan_day with the same date; rows whose date no longer falls within the regenerated plan are kept but get plan_day_id = NULL so the runner doesn't lose history.
        measurementsPreserved: { type: integer }
        undoSnapshotsWiped: { type: integer }
        totalWeeks: { type: integer }

    UpdateAppliedStartingPaceBody:
      type: object
      properties:
        startingPaceSec:
          type: integer
          nullable: true
          minimum: 360
          maximum: 1500
          description: |
            Runner's starting easy pace in seconds/mile. When this key is
            OMITTED, the applied row's existing starting pace is left
            untouched (so a runner can patch only the goal anchor
            without clobbering their start, and vice versa). Present
            with null clears the override, so the generator falls back
            to the first block's recipe easy pace (Task #367) — or to
            the fixed DEFAULT_STARTING_PACE_SEC when a goal anchor is
            set (Task #373). Present with an integer writes it.
        goalEndingPaceSec:
          type: integer
          nullable: true
          minimum: 360
          maximum: 1500
          description: |
            Task #373. Optional goal ending easy pace (sec/mi). When this
            key is OMITTED, the applied row's existing goal value is left
            untouched (legacy single-field callers stay valid). When
            present and non-null, the generator linearly interpolates
            from start (week 1) to goal (final week) on the next
            backfill. When present and null, the goal anchor is cleared
            and the generator reverts to the fixed-rate ramp.

    UpdateAppliedStartingPaceResponse:
      type: object
      required:
        [
          startingPaceSec,
          goalEndingPaceSec,
          scanned,
          seedUpdated,
          runtimeUpdated,
          customizedSkipped,
          outOfScopeSkipped,
        ]
      properties:
        startingPaceSec:
          type: integer
          nullable: true
          description: The newly-applied starting pace (echoes the request value).
        goalEndingPaceSec:
          type: integer
          nullable: true
          description: |
            Task #373. The currently-applied goal ending pace after the
            update. Echoes the request value when the client sent
            `goalEndingPaceSec`; otherwise echoes the unchanged
            applied-snapshot value so the client always sees the truth
            in one round-trip.
        scanned:
          type: integer
          description: Run-card plan_days inspected by the backfill.
        seedUpdated:
          type: integer
          description: Run-card rows whose seed_* columns were patched.
        runtimeUpdated:
          type: integer
          description: Subset of seedUpdated whose runtime columns were also patched (rows the runner had NOT customized through /plan).
        customizedSkipped:
          type: integer
          description: Rows the runner had customized through /plan — seed patched but runtime preserved.
        outOfScopeSkipped:
          type: integer
          description: Non-run rows skipped by the backfill scope guard.
