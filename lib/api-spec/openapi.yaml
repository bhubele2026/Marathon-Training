openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Marathon Command Center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: plan
  - name: workouts
  - name: measurements
  - name: dashboard
  - name: race-week
  - name: planner
  - name: preferences
  - name: scheduled-races
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /plan/overview:
    get:
      operationId: getPlanOverview
      tags: [plan]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanOverview" }

  /plan/weeks:
    get:
      operationId: listPlanWeeks
      tags: [plan]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlanWeek" }

  /plan/weeks/{week}:
    get:
      operationId: getPlanWeek
      tags: [plan]
      parameters:
        - in: path
          name: week
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanWeekDetail" }
        "404":
          description: Plan week not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/days/{id}:
    patch:
      operationId: updatePlanDay
      tags: [plan]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePlanDayBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanDay" }
        "400":
          description: Invalid id or request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Plan day not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/days/{id}/swap:
    post:
      operationId: swapPlanDay
      tags: [plan]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SwapPlanDayBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SwapPlanDayResponse" }
        "400":
          description: Invalid id or request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Plan day not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/days/{id}/reset:
    post:
      operationId: resetPlanDay
      tags: [plan]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanDay" }
        "400":
          description: Invalid id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Plan day not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/weeks/{week}/reset:
    post:
      operationId: resetPlanWeek
      tags: [plan]
      description: Restore every plan day in the given week back to its seeded prescription. Days that have never been edited are left alone. Logged workouts are not touched.
      parameters:
        - in: path
          name: week
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResetPlanWeekResponse" }
        "400":
          description: Invalid week number
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Plan week not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/reset:
    post:
      operationId: resetPlan
      tags: [plan]
      description: |
        Wipe plan_weeks and plan_days back to empty and demote every applied
        planner_configs row to draft state (clears last_applied_at and the
        applied_* snapshot columns) so the dashboard, /today, and /plan
        surfaces fall back to the EmptyPlanState CTA until the runner
        re-applies a config from /planner. Logged workouts have their
        plan_day_id detached but are otherwise preserved; body measurements,
        race results, and the race-week checklist are left untouched (use
        /plan/full-reset for the scorched-earth path that wipes those too).
        Returns a short-lived undoToken (~30 seconds) that POST
        /plan/reset/undo will use to restore every plan_weeks row, every
        plan_days row, every previously-applied planner_configs row's
        applied_*/last_applied_at columns, and the workouts.plan_day_id
        FKs that the wipe detached. Token is null when the plan tables
        were already empty.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResetPlanResponse" }

  /plan/full-reset:
    post:
      operationId: fullResetPlan
      tags: [plan]
      description: |
        Nuclear reset. TRUNCATEs every workout, every body measurement, the
        race-week checklist, every plan_weeks / plan_days row, and any pending
        reset-undo snapshots, then demotes every applied planner_configs row
        back to draft (clears last_applied_at + applied_* snapshot columns).
        Plan tables stay EMPTY — no reseed, no baseline measurement re-insert.
        The dashboard, /today, and /plan surfaces fall back to the
        EmptyPlanState CTA until the runner re-applies a config from /planner.
        Saved planner_configs rows themselves (name, blocks, entries, isActive)
        are preserved so re-applying is a one-click trip. There is no undo for
        this operation.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FullResetPlanResponse" }

  /plan/reset/undo:
    post:
      operationId: undoPlanReset
      tags: [plan]
      description: Restore the plan days that were just wiped by the most recent week-reset or plan-reset call. The undo token is only valid for a short window (~30 seconds) after the reset; after that the snapshot is dropped and the call returns 404.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UndoPlanResetBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UndoPlanResetResponse" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Undo token not found or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/today:
    get:
      operationId: getTodayPlan
      tags: [plan]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TodayPlan" }

  /workouts:
    get:
      operationId: listWorkouts
      tags: [workouts]
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: from
          schema: { type: string }
        - in: query
          name: to
          schema: { type: string }
        - in: query
          name: equipment
          schema: { type: string }
        - in: query
          name: timeOfDay
          description: Filter to workouts with a matching timeOfDay tag. Combines with equipment/date filters. Omit to include all rows regardless of tag.
          schema:
            type: string
            enum: [AM, PM, Other]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Workout" }
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }
    post:
      operationId: createWorkout
      tags: [workouts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWorkoutBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workout" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /workouts/unlinked-count:
    get:
      operationId: getUnlinkedWorkoutsCount
      tags: [workouts]
      description: |
        Number of logged workouts whose `plan_day_id` is NULL — i.e. legacy rows that the Task #161 retro-link backfill couldn't match to a plan day (logged before the active config existed, or on a date with no plan_day on file). Drives the small "N legacy workouts unlinked — review" badge on /log so the runner can spot orphaned rows and either reassign them or accept them as truly off-plan.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnlinkedWorkoutsCount" }

  /workouts/{id}:
    patch:
      operationId: updateWorkout
      tags: [workouts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateWorkoutBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workout" }
        "400":
          description: Invalid id or request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Workout not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteWorkout
      tags: [workouts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: No Content }
        "400":
          description: Invalid id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /measurements:
    get:
      operationId: listMeasurements
      tags: [measurements]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Measurement" }
    post:
      operationId: createMeasurement
      tags: [measurements]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMeasurementBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Measurement" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /measurements/{id}:
    patch:
      operationId: updateMeasurement
      tags: [measurements]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeasurementBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Measurement" }
        "400":
          description: Invalid id or request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Measurement not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteMeasurement
      tags: [measurements]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: No Content }
        "400":
          description: Invalid id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /dashboard/bootstrap:
    get:
      operationId: getDashboardBootstrap
      tags: [dashboard]
      description: |
        Task #383. Consolidated first-paint bootstrap for the dashboard.
        Returns the union of the 8 per-tile payloads the page needs on
        cold load. Server fans the underlying queries out with
        Promise.all so the runner pays one HTTP round-trip instead of
        eight. The per-tile endpoints (`/dashboard/summary`,
        `/dashboard/weight-trend`, `/dashboard/weekly-mileage`,
        `/dashboard/equipment-usage`, `/dashboard/long-run-progression`,
        `/dashboard/recent-activity`, `/plan/today`, `/plan/overview`)
        stay intact for mutations and other pages — only the dashboard
        first paint uses this consolidated endpoint.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardBootstrap" }

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /dashboard/weight-trend:
    get:
      operationId: getWeightTrend
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WeightPoint" }

  /dashboard/weekly-mileage:
    get:
      operationId: getWeeklyMileage
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WeeklyMileagePoint" }

  /dashboard/equipment-usage:
    get:
      operationId: getEquipmentUsage
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EquipmentUsage" }

  /dashboard/equipment-phase-summary:
    get:
      operationId: getEquipmentPhaseSummary
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EquipmentPhaseSummary" }

  /dashboard/long-run-progression:
    get:
      operationId: getLongRunProgression
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LongRunPoint" }

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Workout" }

  /dashboard/recent-lifestyle-activities:
    get:
      operationId: getRecentLifestyleActivities
      tags: [dashboard]
      description: |
        Distinct lifestyle session types ordered by most recent log first.
        Drives the quick-log surfaces (FAB and Dashboard card) so the
        runner's most-recently-logged preset (e.g. "Dog Walk") sorts to
        the front. Sourced from the `workouts` table (equipment =
        Lifestyle), grouped by sessionType, ordered by MAX(date,
        createdAt) DESC. Returns at most 10 entries; empty if the runner
        has never logged a lifestyle activity.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [sessionType, lastLoggedAt]
                  properties:
                    sessionType: { type: string }
                    lastLoggedAt:
                      type: string
                      description: ISO date (YYYY-MM-DD) of the most recent log for this sessionType.

  /planner/templates:
    get:
      operationId: listPlannerTemplates
      tags: [planner]
      description: Static catalog of research-backed plan templates (Couch-to-5K, 5K Improver, 10K Builder, Half Marathon, Marathon, Ultramarathon 50K, Aerobic Base, Speed Block, Hybrid Strength + Run, Cardio + Weight Loss, Recovery, Maintenance) plus three opinionated starter shortcuts. Returned data is read-only and shipped from `@workspace/plan-generator`. The UI Template Library renders this catalog and the runner composes ordered TemplateEntry[] arrays inside their PlannerConfig.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlannerTemplatesResponse" }

  /planner/configs:
    get:
      operationId: listPlannerConfigs
      tags: [planner]
      description: List every saved Planner config and identify which one is currently active. The active config is what POST /planner/apply will regenerate the plan from.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListPlannerConfigsResponse" }
    post:
      operationId: createPlannerConfig
      tags: [planner]
      description: Create a brand-new named Planner config. Optional `setActive` flag (default true on the first config, otherwise false) marks it as the active one immediately. Validates dates and block weeks the same way the update endpoint does.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePlannerConfigBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlannerConfig" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"

  /planner/configs/{id}:
    get:
      operationId: getPlannerConfig
      tags: [planner]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlannerConfig" }
        "404":
          description: Config not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      operationId: updatePlannerConfig
      tags: [planner]
      description: Update an existing Planner config in place (rename, retime, reblock). Validates dates (Monday start, Sunday marathon, at least 16 weeks apart) and that block weeks sum to (totalWeeks - 16). Saving does NOT regenerate plan rows — call POST /planner/apply for that.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePlannerConfigBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlannerConfig" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Config not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deletePlannerConfig
      tags: [planner]
      description: |
        Delete a saved Planner config. If the deleted config was active,
        the next-most-recently-updated remaining config (if any) is
        promoted to active. Deleting the only remaining config is
        allowed — the planner falls back to its empty "create your
        first config" state and `newActiveId` is null.

        Note: deleting a config also drops its applied_* snapshot.
        If the deleted config was the most recently applied one, the
        race anchor (Full Reset / dashboard countdown / race-week
        lookup) falls back to whatever OTHER config has the next-most-
        recent last_applied_at, or to the canonical hard-coded race
        date if no remaining config has ever been applied. Re-Apply
        another config to re-anchor immediately.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeletePlannerConfigResponse" }
        "404":
          description: Config not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /planner/configs/{id}/duplicate:
    post:
      operationId: duplicatePlannerConfig
      tags: [planner]
      description: Create a copy of the given config with a new name (defaults to "<original name> (copy)"). The duplicate is NOT auto-activated and never inherits last_applied_at / applied_* — those only ever come from a real Apply.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DuplicatePlannerConfigBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlannerConfig" }
        "404":
          description: Config not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /planner/configs/{id}/activate:
    post:
      operationId: activatePlannerConfig
      tags: [planner]
      description: Mark this config as the active one. Apply uses the active config; the activate flip is a transactional set-this-row-active-and-clear-the-rest. Activating does NOT regenerate plan rows — call POST /planner/apply for that.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlannerConfig" }
        "404":
          description: Config not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /planner/apply:
    post:
      operationId: applyPlannerConfig
      tags: [planner]
      description: |
        Regenerate plan_weeks and plan_days from the currently ACTIVE
        Planner config. Logged workouts and body measurements are PRESERVED.
        Reset-undo snapshots are dropped because their plan_day ids no longer
        match. Workout plan_day_id FKs are best-effort rebound to the new
        plan_day with the same date; workouts whose date no longer falls
        within the regenerated plan get plan_day_id = NULL.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApplyPlannerConfigResponse" }
        "400":
          description: No active Planner config to apply
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /planner/applied/starting-pace:
    post:
      operationId: updateAppliedStartingPace
      tags: [planner]
      description: |
        Task #370. In-place re-pace of the already-applied campaign.
        Updates `applied_starting_pace_sec` on the most-recently-applied
        planner_configs row AND mirrors the new value back into the source
        `starting_pace_sec` column, then runs the pace-target backfill to
        regenerate uncustomized run cards in place. Workouts, body
        measurements, race results, race-week checklist, and ANY /plan-
        edited day cards (where runtime values diverge from prior seed)
        are preserved. Use this instead of /planner/apply when the only
        thing that needs to change is the starting easy pace — apply
        TRUNCATEs plan_days and loses every per-day customization.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAppliedStartingPaceBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpdateAppliedStartingPaceResponse" }
        "400":
          description: Invalid startingPaceSec value
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: No applied planner config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /preferences:
    get:
      operationId: getUserPreferences
      tags: [preferences]
      description: Read the singleton user preferences row. Lazily seeded with defaults on first read so the client never has to handle a missing-prefs case.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPreferences" }
    put:
      operationId: updateUserPreferences
      tags: [preferences]
      description: Update one or more preference fields. Partial PATCH-style — fields omitted from the body are left untouched.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserPreferencesBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPreferences" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"

  /preferences/suggested-resting-hr:
    get:
      operationId: getSuggestedRestingHr
      tags: [preferences]
      description: |
        Suggest a resting heart rate derived from recently logged workouts so
        runners who never type one in still get the more accurate Karvonen
        zones (Task #146). The server scans the last 90 days of workouts that
        have an `avg_hr` value, takes the lowest steady-state average, and
        subtracts a fixed 35 bpm offset to approximate true resting HR (an
        easy walk/cooldown averages well above resting). The result is
        clamped to [30, 110] bpm, the same range the input accepts. A
        suggestion is only returned when at least 5 qualifying workouts
        exist; otherwise `value` is null and the UI hides the affordance.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuggestedRestingHr" }

  /race-week:
    get:
      operationId: getRaceWeek
      tags: [race-week]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RaceWeekStatus" }

  /race-week/checklist:
    post:
      operationId: createRaceWeekChecklistItem
      tags: [race-week]
      description: Create a user-defined custom checklist item. Default items are seeded by the server and cannot be created this way.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRaceWeekChecklistItemBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RaceWeekChecklistItem" }
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"

  /race-results:
    get:
      operationId: listRaceResults
      tags: [race-week]
      description: |
        Task #266. List every persisted race result, newest first. Powers the
        race history page so runners can revisit prior campaigns' finishes
        long after the post-race recovery banner has expired. Each row
        includes a best-effort `raceKind` derived from the matching
        `plan_days` row on the same date (NULL for orphaned results whose
        plan day no longer exists, e.g. after a Full Reset wiped the plan
        but the race_results row from a prior campaign was preserved by an
        out-of-band restore).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RaceResult" }

  /race-results/{raceDate}:
    put:
      operationId: upsertRaceResult
      tags: [race-week]
      description: |
        Task #345. Upsert a race result by its `race_date` primary key.
        Creates the row if it doesn't exist, otherwise updates it. Used
        by the /races and /today "Log result" CTAs to log a finish for
        a scheduled supplemental race on any date (not just the active
        campaign A-race). The persisted `race_kind` is captured from the
        matching `scheduled_races` row when one exists, falling back to
        the `plan_days` row on the same date so PR comparisons keep
        working across past campaigns.
      parameters:
        - in: path
          name: raceDate
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetRaceResultBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RaceResult" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
    patch:
      operationId: updateRaceResult
      tags: [race-week]
      description: |
        Task #266. Edit any persisted race result by its `race_date` primary
        key. Mirrors the body shape of `setRaceResult` so the same form can
        be reused for both the active campaign banner and the history page.
      parameters:
        - in: path
          name: raceDate
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetRaceResultBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RaceResult" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Race result not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteRaceResult
      tags: [race-week]
      description: |
        Task #266. Delete a persisted race result by its `race_date`
        primary key. Used by the race history page to clean up stale
        entries (e.g. a test row, or a campaign the runner never actually
        ran).
      parameters:
        - in: path
          name: raceDate
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
        "400":
          description: Invalid raceDate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /scheduled-races:
    get:
      operationId: listScheduledRaces
      tags: [scheduled-races]
      description: |
        Task #345. List every scheduled supplemental race the runner has
        added to their calendar, newest race date first. These
        rows live independently of the active Phase Planner config so
        they survive Phase Planner re-applies AND Full Reset, and they
        do not affect the campaign's A-race / `marathonDate` math.
        Logging a finish on race day still writes to `race_results`
        keyed by the same date so PR comparisons (Task #318) and the
        /races history listing both work without a second store.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScheduledRace" }
    post:
      operationId: createScheduledRace
      tags: [scheduled-races]
      description: |
        Task #345. Schedule a new supplemental race on the calendar.
        Returns 409 if a row already exists for the given `raceDate`
        (the primary key) — use PATCH to edit instead.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateScheduledRaceBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduledRace" }
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "409":
          description: A scheduled race already exists for this date
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /scheduled-races/{raceDate}:
    patch:
      operationId: updateScheduledRace
      tags: [scheduled-races]
      description: |
        Task #345. Edit the kind, name, or notes of a scheduled race.
        The `raceDate` primary key is immutable — to move the race to a
        different date, delete and recreate.
      parameters:
        - in: path
          name: raceDate
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateScheduledRaceBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduledRace" }
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Scheduled race not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteScheduledRace
      tags: [scheduled-races]
      description: |
        Task #345. Remove a scheduled race from the calendar. Does NOT
        delete any matching `race_results` row — those persist
        independently so PR history is preserved across schedule
        churn.
      parameters:
        - in: path
          name: raceDate
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
        "400":
          description: Invalid raceDate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /race-week/result:
    put:
      operationId: setRaceResult
      tags: [race-week]
      description: |
        Upsert the runner's race-day result for the currently active race
        date. Used by the post-race recovery banner so the runner can capture
        their finish time, placement, perceived effort, and any free-form
        notes once the race is in the past. The race date is implicit — it's
        always the active planner config's race date — so the body has no
        date field. All fields except `raceDate` echo back nullable so the
        client can render partial saves (e.g. "I'll fill in placement
        later").
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetRaceResultBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RaceResult" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"

  /race-week/checklist/{itemId}:
    put:
      operationId: setRaceWeekChecklistItem
      tags: [race-week]
      parameters:
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetRaceWeekChecklistItemBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RaceWeekChecklistItem" }
        "400":
          description: Invalid item id or body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Checklist item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteRaceWeekChecklistItem
      tags: [race-week]
      description: Delete a user-defined custom checklist item. Default items cannot be deleted and return 400.
      parameters:
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteRaceWeekChecklistItemResponse" }
        "400":
          description: Item is a default item and cannot be deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Checklist item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Error:
      type: object
      description: Standard error envelope returned for non-validation 4xx failures (e.g. invalid id, not found).
      required: [error]
      properties:
        error: { type: string }

    ValidationError:
      type: object
      description: Error envelope returned when a request body or query fails Zod validation. The `error` field is the structured payload produced by `zodError.flatten()`.
      required: [error]
      properties:
        error:
          type: object
          required: [formErrors, fieldErrors]
          properties:
            formErrors:
              type: array
              items: { type: string }
            fieldErrors:
              type: object
              additionalProperties:
                type: array
                items: { type: string }

    StrengthBlock:
      type: object
      description: |
        Phase 1. One real movement within a strength day — the unit the day model
        used to lack. A strength workout is an ordered list of these (movement,
        pattern, sets, reps, load target), not just a minute count. Persisted on
        plan_days.strength_blocks (and workouts.strength_blocks for actuals).
      required: [movement, pattern, sets]
      properties:
        movement: { type: string, description: 'e.g. "Back Squat", "Bench Press".' }
        pattern:
          type: string
          enum: [squat, hinge, horizontal_push, horizontal_pull, vertical_push, vertical_pull, lunge, carry, core]
          description: Primary movement pattern, used for weekly-balance checks.
        sets: { type: number }
        reps:
          type: string
          nullable: true
          description: 'OPTIONAL rep guidance ("8-10"). Usually null — Tonal drives reps.'
        loadType:
          type: string
          nullable: true
          enum: [percent_1rm, rir, lb, bodyweight]
          description: OPTIONAL. Usually null — Tonal''s auto-weight owns the load.
        loadValue:
          type: number
          nullable: true
          description: 'OPTIONAL numeric load when given. Usually null — Tonal auto-loads.'
        tempo: { type: string, nullable: true }
        restSec: { type: number, nullable: true }
        equipment: { type: string, nullable: true, description: 'Per-movement equipment, e.g. "Tonal + bench".' }
        tonalMode: { type: string, nullable: true, description: 'Named Tonal mode (eccentric, chains, burnout, spotter). Free text; Tonal has no public API.' }
        cue: { type: string, nullable: true, description: Short coaching cue. }

    PlanDay:
      type: object
      required:
        [
          id,
          week,
          phase,
          date,
          day,
          equipment,
          description,
          sessionType,
          isRest,
          totalLoad,
          isCustomized,
          customizedFields,
          customizedDiff,
          sourceEntryIndex,
          personalizedRacePace,
          personalizedPace,
          personalizedLongRunPace,
        ]
      properties:
        id: { type: integer }
        week: { type: integer }
        phase: { type: string }
        date: { type: string }
        day: { type: string }
        strengthLoad: { type: number, nullable: true }
        equipment: { type: string }
        equipmentList:
          type: array
          nullable: true
          items: { type: string }
          description: |
            Ordered chip rail of every machine the runner will use that day. The UI renders one chip per element so a Tue strength + cardio day shows "TONAL · PELOTON BIKE" instead of just "TONAL". Per the task #77 contract the scalar `equipment` field above always equals `equipmentList[0]` (the *primary* machine for the day) so any back-compat code path that still reads the scalar — dashboard equipment usage, suggestions pairKey, `/equipment` page — agrees with the chip rail's lead chip. Nullable to match the underlying DB column on legacy rows that predate the task #77 backfill, but in practice the server normalizes both NULL and empty arrays to `[equipment]` before responding so this field is always present and non-empty in API responses; clients should still tolerate `null` defensively (e.g. `equipmentList ?? [equipment]`).
        description: { type: string }
        strengthBlocks:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/StrengthBlock" }
          description: |
            Phase 1. Ordered real strength movements prescribed for this day — the
            actual lifting workout (movements, sets, reps, load). Null on rest,
            pure-conditioning, pure-run days, and on legacy / engine-generated rows
            that only carry minute buckets; the UI falls back to the prose
            `description` + minute breakdown when null. Week-over-week change in
            these blocks is how progression is expressed.
        strengthMin:
          type: number
          nullable: true
          description: Prescribed Tonal / lift minutes for this day (heavy block plus accessory work). Null on rows that pre-date the breakdown columns and have not yet been backfilled.
        cardioMin:
          type: number
          nullable: true
          description: Prescribed non-running cross-train minutes (bike, row, spin). Does NOT include treadmill or outdoor running minutes — those live in `runMin`.
        runMin:
          type: number
          nullable: true
          description: Prescribed treadmill or outdoor running minutes for this day. Null on rows that pre-date the breakdown columns and have not yet been backfilled.
        totalMin:
          type: number
          nullable: true
          description: Sum of strengthMin, cardioMin, and runMin. Null when ALL three buckets are null (ambiguous legacy row that backfill couldn't classify); otherwise nulls in individual buckets are treated as 0. Server-computed so the UI's TOTAL · LIFT · CARDIO · RUN tile is consistent across pages.
        distanceMi: { type: number, nullable: true }
        pace: { type: string, nullable: true }
        sessionType: { type: string }
        isRest: { type: boolean }
        totalLoad: { type: number }
        isCustomized:
          type: boolean
          description: True when this day's prescription differs from the originally-seeded snapshot (i.e. it has been edited or swapped).
        customizedFields:
          type: array
          items: { type: string }
          description: camelCase field names whose current value differs from the seeded snapshot. Empty when isCustomized is false.
        customizedDiff:
          type: array
          description: Per-field before/after diff for the "Edited" badge popover. One entry per item in customizedFields (same order). Empty when isCustomized is false. Values are stringified — the UI applies field-specific formatting (e.g. distanceMi gets a "mi" suffix). null values mean the field had no seeded value or has been cleared.
          items:
            type: object
            required: [field, before, after]
            properties:
              field: { type: string }
              before: { type: string, nullable: true }
              after: { type: string, nullable: true }
        sourceEntryIndex:
          type: integer
          description: |
            Task #135. Identifies which TemplateEntry within the active planner config produced this row. 0 for legacy single-program campaigns and for blocks-mode configs; 0..N-1 for entries-mode configs (one row per entry that overlaps the date). The composite UNIQUE(date, sourceEntryIndex) on plan_days lets two concurrent overlapping programs each emit a row on the same calendar date.
        sourceEntryLabel:
          type: string
          nullable: true
          description: |
            Task #135. Human-readable program name (entry.customName or template name) shown as a badge in /today and /plan when concurrent programs are running. Null on legacy blocks-mode rows.
        personalizedRacePace:
          nullable: true
          description: |
            Task #228. Race-day Sun pace target overlay computed at READ time from the runner's recent quality workouts (tempo, threshold, interval, sharpener, VO2, race-pace, logged Race), with the per-kind `RACE_DAY_SPECS[raceKind].pace` catalog value as the fallback when fewer than 3 parseable quality paces exist in the lookback window. Populated ONLY on race-day Sun rows that the server recognised as a real race (sessionType `Race` or the generator's "RACE DAY — <Marathon|Half|10K|5K>" description prefix); null on every other day so the UI can render the personalized chip / explainer tooltip exclusively on the race-day card. The pace string here may differ from the row-level `pace` field — that field is the seeded plan value (or any user customization), while this overlay reflects the live recommendation derived from training history.
          type: object
          required: [pace, source, sampleSize, lookbackWeeks, basisPaceSeconds]
          properties:
            pace:
              type: string
              description: Final race-day pace string the chip should render (e.g. "10:55"). Either personalized from history or pulled from the catalog.
            source:
              type: string
              enum: [personalized, catalog]
              description: Where the pace came from. "personalized" means at least 3 parseable quality paces fed the average; "catalog" means we fell back to `RACE_DAY_SPECS[raceKind].pace`.
            sampleSize:
              type: integer
              description: Number of quality workouts that fed the average. 0 when source is "catalog".
            lookbackWeeks:
              type: integer
              description: Lookback window in whole weeks the quality sample was drawn from. Mirrors the input so the UI tooltip can render "last N weeks of training" without re-deriving it.
            basisPaceSeconds:
              type: integer
              nullable: true
              description: Average pace seconds/mile of the quality sample BEFORE the per-kind race-day offset is applied. Null when source is "catalog". Surfaced so the tooltip can show the raw training pace alongside the personalized race-day target ("10:30 tempo avg → 11:00 race target").
        personalizedPace:
          nullable: true
          description: |
            Task #236. Personalized prescribed pace overlay for the Wed steady (Z3) and Fri tempo / threshold / race-pace slots — the other quality run rows the generator seeds from the same per-recipe `tempoPace` catalog value. Computed at READ time from the same recent quality-workout history that drives `personalizedRacePace`, but with NO per-kind offset (the runner's tempo average IS the prescribed Wed/Fri target). Falls back to the row's own seeded `pace` when fewer than 3 parseable quality paces exist in the lookback window. Populated ONLY on rows the server recognised as one of those quality slots (matched by day-of-week + sessionType in `isPersonalizableQualityPlanDay`); the W51 taper Sharpener and W52 Race Shakeout are intentionally excluded because they're seeded with `easyPace`, not `tempoPace`. Null on every other day so the UI can render the chip exclusively on the matching session card. Mirrors the `personalizedRacePace` shape so the chip + tooltip rendering can be shared.
          type: object
          required: [pace, source, sampleSize, lookbackWeeks, basisPaceSeconds]
          properties:
            pace:
              type: string
              description: Final prescribed pace string the chip should render (e.g. "10:30"). Either personalized from history or echoed from the row's catalog `pace`.
            source:
              type: string
              enum: [personalized, catalog]
              description: Where the pace came from. "personalized" means at least 3 parseable quality paces fed the average; "catalog" means we fell back to the row's seeded `pace`.
            sampleSize:
              type: integer
              description: Number of quality workouts that fed the average. 0 when source is "catalog".
            lookbackWeeks:
              type: integer
              description: Lookback window in whole weeks the quality sample was drawn from. Mirrors the input so the UI tooltip can render "last N weeks of training" without re-deriving it.
            basisPaceSeconds:
              type: integer
              nullable: true
              description: Average pace seconds/mile of the quality sample. For Wed/Fri quality rows this equals the personalized pace's seconds value (no per-kind offset is applied — these slots ARE the tempo-pace rung). Null when source is "catalog".
        personalizedLongRunPace:
          nullable: true
          description: |
            Task #239. Personalized prescribed pace overlay for the Sun long-run row — the other seeded pace on every recipe (`recipe.longPace`, the catalog value the generator stamps on every non-race-week Sun "Long Run" row at lib/plan-generator/src/index.ts:484, :2227, :2647). Computed at READ time from the runner's recent EASY AEROBIC workouts (Long Run / Aerobic Base / Recovery sessions matched by `isLongRunSession`) — a separate sample pool from the quality pool that drives `personalizedRacePace` / `personalizedPace`, so quality work doesn't drag the long-run pace toward tempo speed. No per-kind offset (the runner's easy-aerobic average IS the prescribed long-run pace). Falls back to the row's own seeded `pace` when fewer than 3 parseable easy-aerobic paces exist in the lookback window. Populated ONLY on rows that `isPersonalizableLongRunPlanDay` matches (Sun + sessionType "Long Run"); race-day Sun is intentionally excluded — that row is owned by `personalizedRacePace` instead, so the two overlays are mutually exclusive on any given Sun. Null on every other day so the UI can render the chip exclusively on the Sun long-run card. Mirrors the `personalizedPace` shape so the chip + tooltip rendering can be shared.
          type: object
          required: [pace, source, sampleSize, lookbackWeeks, basisPaceSeconds]
          properties:
            pace:
              type: string
              description: Final prescribed long-run pace string the chip should render (e.g. "13:00"). Either personalized from history or echoed from the row's catalog `pace`.
            source:
              type: string
              enum: [personalized, catalog]
              description: Where the pace came from. "personalized" means at least 3 parseable easy-aerobic paces fed the average; "catalog" means we fell back to the row's seeded `pace`.
            sampleSize:
              type: integer
              description: Number of easy-aerobic workouts (Long Run / Aerobic Base / Recovery) that fed the average. 0 when source is "catalog".
            lookbackWeeks:
              type: integer
              description: Lookback window in whole weeks the easy-aerobic sample was drawn from. Mirrors the input so the UI tooltip can render "last N weeks of training" without re-deriving it.
            basisPaceSeconds:
              type: integer
              nullable: true
              description: Average pace seconds/mile of the easy-aerobic sample. Equals the personalized pace's seconds value (no per-kind offset is applied — Sun long run IS the easy-aerobic rung). Null when source is "catalog".

    UpdatePlanDayBody:
      type: object
      description: Editable fields for a planned (prescribed) workout. Date, day, week, and phase are immutable - use the swap endpoint to move sessions between days (within the same week or across weeks).
      properties:
        sessionType: { type: string }
        equipment: { type: string }
        equipmentList:
          type: array
          nullable: true
          items: { type: string }
          description: Optional ordered chip rail of every machine the runner will use that day. When provided, the server stores it verbatim and (when `equipment` is also patched) validates `equipmentList[0] === equipment`. When omitted but `equipment` changes, the server collapses the rail to `[equipment]`.
        description: { type: string }
        distanceMi: { type: number, nullable: true }
        strengthMin: { type: number, nullable: true }
        cardioMin: { type: number, nullable: true }
        runMin: { type: number, nullable: true }
        pace: { type: string, nullable: true }
        strengthLoad: { type: number, nullable: true }
        totalLoad: { type: number }
        isRest: { type: boolean }

    SwapPlanDayBody:
      type: object
      required: [withDayId]
      properties:
        withDayId:
          type: integer
          description: id of the partner plan_day to swap session content with. May be in the same week or in any other week of the plan.

    SwapPlanDayResponse:
      type: object
      required: [from, to, weeksAffected, phaseChanged]
      properties:
        from: { $ref: "#/components/schemas/PlanDay" }
        to: { $ref: "#/components/schemas/PlanDay" }
        weeksAffected:
          type: array
          description: Plan-week numbers whose aggregates were recomputed by this swap. One element for an in-week swap, two for a cross-week swap.
          items: { type: integer }
        phaseChanged:
          type: boolean
          description: True when the swap moved sessions across a phase boundary (the two days started out in different phases).
        undoToken:
          type: string
          nullable: true
          description: Short-lived token for POST /plan/reset/undo to restore the pre-swap state. Expires after roughly 30 seconds.
        undoExpiresInSeconds:
          type: integer
          nullable: true
          description: Approximate number of seconds the undoToken will remain valid for. Null when undoToken is null.

    ResetPlanWeekResponse:
      type: object
      required: [week, daysReset, daysTotal]
      properties:
        week: { type: integer }
        daysReset:
          type: integer
          description: Number of plan days that actually had a seed snapshot to restore from. Untouched days are not counted.
        daysTotal:
          type: integer
          description: Total number of plan days in the week (including untouched ones).
        undoToken:
          type: string
          nullable: true
          description: Short-lived token that can be passed to POST /plan/reset/undo to restore the just-wiped customizations. Null when nothing was reset (i.e. daysReset is 0). Expires after roughly 30 seconds.
        undoExpiresInSeconds:
          type: integer
          nullable: true
          description: Approximate number of seconds the undoToken will remain valid for. Null when undoToken is null.

    ResetPlanResponse:
      type: object
      required: [weeksReset, daysReset, daysTotal]
      properties:
        weeksReset:
          type: integer
          description: Number of plan_weeks rows wiped by the reset. Zero when the plan tables were already empty.
        daysReset:
          type: integer
          description: Number of plan_days rows wiped by the reset. Zero when the plan tables were already empty.
        daysTotal:
          type: integer
          description: Equal to daysReset (the total number of plan days that existed before the wipe). Kept in the response for OpenAPI back-compat with the prior customization-rollback contract.
        undoToken:
          type: string
          nullable: true
          description: Short-lived token that can be passed to POST /plan/reset/undo to restore every plan_weeks row, every plan_days row, every previously-applied planner_configs row's applied_*/last_applied_at columns, and the workouts.plan_day_id FKs that the wipe detached. Null when the plan tables were already empty (i.e. weeksReset and daysReset are both 0). Expires after roughly 30 seconds.
        undoExpiresInSeconds:
          type: integer
          nullable: true
          description: Approximate number of seconds the undoToken will remain valid for. Null when undoToken is null.

    FullResetPlanResponse:
      type: object
      required:
        [
          weeksSeeded,
          daysSeeded,
          workoutsWiped,
          measurementsWiped,
          measurementsSeeded,
          checklistItemsWiped,
          undoSnapshotsWiped,
        ]
      properties:
        weeksSeeded:
          type: integer
          description: Number of plan_weeks rows reinserted from the canonical generator (52 for the standard campaign).
        daysSeeded:
          type: integer
          description: Number of plan_days rows reinserted from the canonical generator (364 for the standard campaign).
        workoutsWiped:
          type: integer
          description: Number of logged workout rows that were deleted by the reset.
        measurementsWiped:
          type: integer
          description: Number of measurements rows that were deleted by the reset (includes the baseline row, which is then reinserted from the seed).
        measurementsSeeded:
          type: integer
          description: Number of baseline measurements rows reinserted from the seed (1 for the standard campaign).
        checklistItemsWiped:
          type: integer
          description: Number of race-week checklist rows that were deleted by the reset.
        undoSnapshotsWiped:
          type: integer
          description: Number of pending reset-undo snapshots that were dropped (so a stale Undo can't restore deleted state after the full reset).

    UndoPlanResetBody:
      type: object
      required: [undoToken]
      properties:
        undoToken:
          type: string
          description: Token previously returned by POST /plan/weeks/{week}/reset or POST /plan/reset.

    UndoPlanResetResponse:
      type: object
      required: [daysRestored, weeksAffected]
      properties:
        daysRestored:
          type: integer
          description: Number of plan days whose pre-reset customizations were restored.
        weeksAffected:
          type: array
          items: { type: integer }
          description: Plan-week numbers whose aggregates were recomputed by the undo.

    PlanWeek:
      type: object
      required:
        [
          week,
          phase,
          startDate,
          endDate,
          plannedTotalLoad,
          plannedMiles,
          longRunMi,
        ]
      properties:
        week: { type: integer }
        phase: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        plannedStrength: { type: number, nullable: true }
        plannedCardio: { type: number, nullable: true }
        plannedTotalLoad: { type: number }
        plannedMiles: { type: number }
        longRunMi: { type: number }
        actualMiles: { type: number, nullable: true }
        actualCardio:
          type: number
          nullable: true
          description: |
            Total `cardio_min` across the week's logged workouts (excluding
            Skipped sessions). Mirrors `actualMiles` so bike/row weeks can
            render an actual-vs-planned cardio-minute headline (task #109)
            in the same style run weeks render miles.
        completedSessions: { type: integer, nullable: true }
        totalSessions: { type: integer, nullable: true }
        missedSessions: { type: integer, nullable: true }
        customizedDays:
          type: integer
          nullable: true
          description: Number of plan days in this week that have been edited or swapped from the original prescription.
        dominantCardioEquipment:
          type: string
          nullable: true
          description: |
            For Bike-only / Row-only weeks where `plannedMiles` is 0 but
            `plannedCardio` is high, the most-used cardio machine across
            the week's non-rest plan days (e.g. "Peloton Bike",
            "Peloton Row"). Computed by summing `cardio_min` per equipment
            and picking the highest. Null when no plan day has cardio_min
            > 0 or when the week has no plan days yet (legacy / freshly
            seeded weeks).
        wedSteady:
          type: boolean
          nullable: true
          description: |
            Task #175. True when this week's Wednesday plan day is a
            Steady (Z3) Run + Accessory session — i.e. the same gating
            the generator uses to upgrade the mid-week run on
            Marathon-Specific weeks (recipe `wedKind: "Steady"`,
            non-cutback, non-race-week). Sourced directly from
            `plan_days.session_type` so customizations that swap Wed
            away from steady are reflected here. Drives the amber-400
            "Steady" chip on the plan calendar week strip so runners
            can see at a glance which weeks earn the Z3 stimulus
            without opening each week. Null on weeks with no Wed plan
            day yet (freshly seeded / legacy data).
        programs:
          type: array
          nullable: true
          description: |
            Task #162. Per-program completion breakdown for this week,
            for runners stacking concurrent programs (e.g. a Tonal lift
            program alongside a 5K running program). Each entry pairs a
            TemplateEntry contributing plan_days this week with its own
            completed / total / missed session counts so weekly summary
            cards can render "Tonal Lift 3/4 · 5K Improver 2/4" instead
            of rolling everything into a single combined ratio. The
            existing `completedSessions` / `totalSessions` /
            `missedSessions` fields above remain the COMBINED totals
            across all programs. Null on weeks with no plan_days yet
            (freshly seeded / legacy data); a single-element array for
            single-program campaigns. Ordered by `sourceEntryIndex`
            ascending.
          items: { $ref: "#/components/schemas/PlanWeekProgram" }
        scheduledRaces:
          type: array
          nullable: true
          description: |
            Task #345. Every supplemental scheduled race that lands in
            this week's [startDate, endDate] window, ordered by
            `raceDate` ascending. Lets weekly summary cards render a
            "5K · Sat" chip alongside the planned-load summary so
            runners can see scheduled B-races on the calendar at a
            glance. Independent of `marathonDate` / the active campaign
            so the chip survives Phase Planner re-applies and Full
            Reset. Null on freshly seeded weeks for back-compat.
          items: { $ref: "#/components/schemas/ScheduledRace" }
        raceKind:
          type: string
          enum: [marathon, half, "10k", "5k"]
          nullable: true
          description: |
            Task #242. Kind of race the campaign is anchored on, mirrored
            on per-week responses so the /plan/:week eyebrow can switch
            to "5K Campaign" / "10K Campaign" / "Half Marathon Campaign"
            / "Race Campaign" framing without a second round-trip to
            /plan/overview. Same detection as `PlanOverview.raceKind`
            (trailing plan_day Sunday with an explicit race signal),
            populated only on the per-week detail endpoint
            (`getPlanWeek`); list aggregations (`/plan/weeks`) leave it
            null since they don't drive the eyebrow.

    PlanWeekProgram:
      type: object
      required:
        [
          sourceEntryIndex,
          label,
          completedSessions,
          totalSessions,
          missedSessions,
        ]
      properties:
        sourceEntryIndex: { type: integer }
        label:
          type: string
          description: Human-readable program name; falls back to "Marathon Plan" for legacy single-program campaigns.
        completedSessions:
          type: integer
          description: Non-rest plan_days for this program in this week with at least one logged (non-Skipped) workout attributed to them.
        totalSessions:
          type: integer
          description: Non-rest plan_days for this program in this week.
        missedSessions:
          type: integer
          description: Non-rest plan_days for this program in this week whose date is in the past with no logged workout attributed to them.

    PlanDayWithSuggestions:
      allOf:
        - $ref: "#/components/schemas/PlanDay"
        - type: object
          properties:
            suggestions:
              allOf:
                - $ref: "#/components/schemas/WorkoutSuggestions"
              nullable: true

    PlanWeekDetail:
      allOf:
        - $ref: "#/components/schemas/PlanWeek"
        - type: object
          required: [days]
          properties:
            days:
              type: array
              items: { $ref: "#/components/schemas/PlanDayWithSuggestions" }

    PlanOverview:
      type: object
      required:
        [
          hasPlan,
          currentWeek,
          currentPhase,
          totalWeeks,
          weeksRemaining,
          raceDate,
          startDate,
          startWeight,
          currentWeight,
          goalWeight,
          activeConfigName,
          scienceVersion,
          lastAppliedAt,
          lastAppliedConfigId,
          coachUpgradeAvailable,
          startingPaceSec,
          includesRunning,
        ]
      properties:
        hasPlan:
          type: boolean
          description: |
            Task #307. False when no Phase Planner config has ever been
            applied (fresh installs and after a Full Reset that was run
            against an empty `planner_configs`). Drives the /plan page's
            "Open Phase Planner" empty state. All other plan-driven
            fields on this payload still carry sentinel values
            (`currentWeek=0`, empty `currentPhase`, etc) when false so
            the schema stays simple, but clients should NOT render them.
        currentWeek: { type: integer }
        currentPhase: { type: string }
        totalWeeks: { type: integer }
        weeksRemaining: { type: integer }
        raceDate:
          type: string
          nullable: true
          description: |
            Task #329. ISO yyyy-mm-dd of the campaign's race / final day,
            sourced from the most-recently-applied planner config's
            `appliedMarathonDate`. Falls back to the trailing
            `plan_weeks.endDate` when the applied snapshot is missing,
            and to null on fresh installs / post Full Reset (where
            `hasPlan === false` and the EmptyPlanState CTA renders).
        startDate:
          type: string
          nullable: true
          description: |
            Task #329. ISO yyyy-mm-dd of the campaign's first day,
            sourced from the most-recently-applied planner config's
            `appliedStartDate`. Falls back to the leading
            `plan_weeks.startDate` when the applied snapshot is missing,
            and to null on fresh installs / post Full Reset.
        startWeight:
          type: number
          nullable: true
          description: |
            Task #330. Body-mass start target (lbs). Sourced from the
            most-recently-applied planner config's `appliedStartWeight`,
            falling back to the runner's earliest measurement weight.
            NULL on fresh installs with no measurements and no applied
            config — the dashboard / plan header omits the goal-line
            text in that case.
        currentWeight: { type: number, nullable: true }
        goalWeight:
          type: number
          nullable: true
          description: |
            Task #330. Body-mass goal target (lbs). Sourced from the
            most-recently-applied planner config's `appliedGoalWeight`.
            NULL when the runner hasn't set a goal on their applied
            config — the dashboard / plan header renders an em-dash
            sentinel in that case rather than the legacy hardcoded 210.
        weeklyMilesTarget: { type: number }
        longRunTarget: { type: number }
        activeConfigName:
          type: string
          description: |
            Task #244. Display name of the currently-active planner
            config (the row in `planner_configs` with the most recent
            `last_applied_at`). Drives the /plan page header title and
            the sidebar nav label so the UI follows whatever the runner
            named their plan instead of hardcoding "Half Marathon
            Campaign". Falls back to "Workout Plan" when no config has
            ever been applied.
        programs:
          type: array
          description: |
            Task #135. Every program (TemplateEntry) currently contributing rows to plan_days, ordered by sourceEntryIndex. The /plan overview renders this as a parallel-tracks panel so a runner can see at a glance which concurrent programs are stacked. Aggregated from plan_days so the panel always reflects the applied state. For legacy single-program campaigns this is a one-element array labelled "Marathon Plan".
          items:
            type: object
            required: [sourceEntryIndex, label, startDate, endDate, weeks]
            properties:
              sourceEntryIndex: { type: integer }
              label: { type: string }
              startDate: { type: string }
              endDate: { type: string }
              weeks: { type: integer }
        raceKind:
          type: string
          enum: [marathon, half, "10k", "5k"]
          nullable: true
          description: |
            Task #204. Kind of race the campaign is anchored on, derived
            from the trailing plan_day Sunday. Populated when that final
            row is a recognised race day (sessionType `Race` or the
            generator's "RACE DAY — <Marathon|Half|10K|5K>" description
            prefix); resolved from the description first so a runner who
            edits the distance still gets the right kind, then falls
            back to `distance_mi`. Null on tonal-first / non-race plans
            (lift_primary blocks, ad-hoc Custom blocks) and on legacy /
            freshly seeded campaigns with no plan_days yet. Drives the
            "Race Campaign" / per-kind ("5K Campaign", "10K Campaign",
            "Half Marathon Campaign", "Marathon Campaign") framing on
            the /plan header so half / 10K / 5K entries-mode plans get
            the same "Weeks to Race Day" copy marathon plans do, instead
            of falling back to a generic "Workout Plan · Weeks Remaining".
        includesRunning:
          type: boolean
          description: |
            Behavior rehaul R1. The single authoritative "this plan includes
            running" flag. Running is an OPT-IN module — the default plan is
            strength + body-recomposition (Tonal lifting + low-impact Peloton
            Bike/Row conditioning) with ZERO programmed miles and no Long Run.
            True only when the runner explicitly opted into running: the
            campaign is anchored on a run race (`raceKind` is non-null), a
            scheduled race is upcoming (`nextScheduledRace`), or the applied
            plan_days actually program running (any distance_mi > 0 or
            run_min > 0). False for the default recomp / lift-primary plan and
            on freshly seeded campaigns with no plan_days. Every running-aware
            surface (Plan tiles, Today, dashboard) should gate on THIS flag
            rather than re-deriving running from raceKind / miles.
        nextMissedDate:
          type: string
          nullable: true
          description: |
            Task #33. ISO yyyy-mm-dd of the earliest non-rest plan_day
            in the past that has no logged workout attributed to it
            (workouts.plan_day_id == plan_days.id, or a legacy
            plan_day_id IS NULL match on the same date). Lets the /plan
            header surface a "Next Missed" shortcut that jumps the
            runner straight to the day they need to back-fill instead
            of forcing them to scrub week by week. Null when no missed
            sessions exist (everything caught up, or pre-launch with
            no past plan_days yet).
        nextMissedWeek:
          type: integer
          nullable: true
          description: |
            Task #33. Week number containing `nextMissedDate`, surfaced
            so the client can navigate to /plan/:week without a second
            lookup. Null whenever `nextMissedDate` is null.
        nextScheduledRace:
          allOf:
            - $ref: "#/components/schemas/NextScheduledRace"
          nullable: true
          description: |
            Task #345. Closest upcoming supplemental scheduled race
            (raceDate >= today), or null when none are on the calendar.
            Carries `daysUntil` (server-computed delta from today, 0 on
            race day) so the /plan header can render a "Next race · 5K
            · in N days" chip without a second round-trip.
        nextMissedPlanDayId:
          type: integer
          nullable: true
          description: |
            Task #33. plan_day.id of the earliest missed session.
            Surfaced so the client can highlight the EXACT card after
            navigation, even when concurrent overlapping programs share
            a calendar date and the missed row isn't the primary
            (lowest-source-entry-index) card. Null whenever
            `nextMissedDate` is null.
        scienceVersion:
          type: string
          description: |
            Task #354. Stamp identifying the current version of the
            underlying training science (long-run progression curves,
            race-distance ceilings, per-zone targeting, etc.). Bumped
            whenever the generator output changes meaningfully for a
            previously-applied plan. The /plan page compares this
            against `lastAppliedAt`; when the applied snapshot predates
            this stamp the page surfaces a dismissable "Coach upgrades
            available — re-Apply your config" banner. Format is the
            yyyy-mm-dd of the upgrade so banner-dismissal can be keyed
            by stamp in localStorage and re-arm at the next bump.
        lastAppliedAt:
          type: string
          nullable: true
          description: |
            Task #354. ISO timestamp of the most recent `/planner/apply`
            against the runner's currently-applied config. Null on
            fresh installs / after Full Reset (no config has ever been
            applied — `hasPlan === false`). Surfaced alongside
            `scienceVersion` so the /plan coach-upgrade banner can
            decide whether the applied snapshot is stale.
        lastAppliedConfigId:
          type: integer
          nullable: true
          description: |
            Task #354. planner_configs.id of the most-recently-applied
            config. The /plan coach-upgrade banner's "Re-Apply" button
            activates this row and re-runs Apply so the runner doesn't
            have to round-trip through the Phase Planner. Null whenever
            `lastAppliedAt` is null.
        coachUpgradeAvailable:
          type: boolean
          description: |
            Task #354. True when there is an applied planner config AND
            its `lastAppliedAt` predates the server's current
            `scienceVersion` — i.e. the generator has been upgraded
            since the runner last applied their plan and the visible
            numbers are out of date. Drives the /plan page's
            dismissable nudge banner. Always false when nothing has
            been applied yet (the EmptyPlanState CTA covers that case).
        startingPaceSec:
          type: integer
          nullable: true
          description: |
            Task #370. Currently-applied starting easy pace (sec/mi),
            sourced from `planner_configs.appliedStartingPaceSec` on
            the most-recently-applied row. NULL when no config has
            been applied OR the runner cleared the override (the
            generator then falls back to the recipe-default easy pace).
            Drives the /plan header's "Update Starting Pace" dialog
            so the form can pre-fill with the current value.
        goalEndingPaceSec:
          type: integer
          nullable: true
          description: |
            Task #373. Currently-applied goal ending easy pace (sec/mi),
            sourced from `planner_configs.appliedGoalEndingPaceSec` on
            the most-recently-applied row. NULL when no config has been
            applied OR the runner hasn't set a goal anchor (the
            generator then keeps the legacy fixed-rate ~3.75 sec/mi/wk
            ramp). When BOTH this and `startingPaceSec` are non-null,
            the generator linearly interpolates from start (week 1) to
            goal (final week). Drives the /plan header's "Update
            Starting Pace" dialog so the form can pre-fill both anchors.

    TodayPlan:
      type: object
      required: [date, hasPlan, loggedWorkouts, plans]
      properties:
        date: { type: string }
        hasPlan: { type: boolean }
        plan:
          allOf:
            - $ref: "#/components/schemas/PlanDay"
          nullable: true
          description: |
            Back-compat single-plan field — the lowest-sourceEntryIndex plan_day for today, or null if there is none. New clients should iterate `plans[]` to render concurrent program sessions side-by-side; this field stays populated so legacy clients still work when only one program is active.
        plans:
          type: array
          description: |
            Task #135. Every plan_day on today's date, ordered by sourceEntryIndex ascending. Concurrent overlapping programs each contribute one row so the UI can render program-attributed cards (lift program + run program) side-by-side. Empty when no plan day exists for today (pre-launch or post-marathon).
          items: { $ref: "#/components/schemas/PlanDay" }
        loggedWorkouts:
          type: array
          description: All workouts logged for today, ordered by timeOfDay (AM, PM, Other, then untagged) and then createdAt ascending. Empty when nothing has been logged yet.
          items: { $ref: "#/components/schemas/Workout" }
        suggestions:
          allOf:
            - $ref: "#/components/schemas/WorkoutSuggestions"
          nullable: true
        daysUntilStart:
          type: integer
          nullable: true
          description: Number of days from today until the first scheduled (non-rest) plan day. Populated only when today is before that first session; null once the campaign has started. Lets the UI render a "campaign starts in N days" countdown during the pre-launch window.
        firstSession:
          allOf:
            - $ref: "#/components/schemas/PlanDay"
          nullable: true
          description: Preview of the first scheduled (non-rest) plan day. Populated alongside daysUntilStart only when today is before that session; null once the campaign has started.
        nextScheduledRace:
          allOf:
            - $ref: "#/components/schemas/NextScheduledRace"
          nullable: true
          description: |
            Task #345. Closest upcoming supplemental scheduled race
            (raceDate >= today), or null when none are on the
            calendar. Carries `daysUntil` (server-computed, 0 on
            race day) so /today can render a "Next race · 5K · in N
            days" chip without a second round-trip. On the race day
            itself the row is still surfaced so the UI can swap the
            chip for a "Log result" CTA.
        raceKind:
          type: string
          enum: [marathon, half, "10k", "5k"]
          nullable: true
          description: |
            Task #306. Kind of race the campaign is anchored on, mirrored
            on /plan/today so the Today page eyebrow can switch to the
            per-kind framing ("5K Campaign" / "10K Campaign" / "Half
            Marathon Campaign" / "Race Campaign") without forcing the
            page to also fetch /plan/overview. Same detection as
            `PlanOverview.raceKind` (Task #204) and `PlanWeek.raceKind`
            (Task #242) — derived from the trailing plan_day Sunday with
            an explicit race signal. Null on tonal-first / non-race
            plans (lift_primary blocks, ad-hoc Custom blocks) and on
            freshly seeded campaigns with no plan_days yet so the Today
            page renders no eyebrow in those cases.

    WorkoutSuggestions:
      type: object
      required: [sampleSize]
      properties:
        rpe: { type: integer, nullable: true }
        avgHr: { type: integer, nullable: true }
        pace: { type: string, nullable: true }
        paceSource:
          type: string
          enum: [plan, history]
          nullable: true
          description: Where the suggested pace came from. "plan" if it was prescribed by the plan day, "history" if it was averaged from recent comparable sessions. Null when no pace suggestion is available.
        sampleSize: { type: integer }

    Workout:
      type: object
      required: [id, date, equipment, sessionType, createdAt, isCustomized, customizedFields, customizedDiff]
      properties:
        id: { type: integer }
        planDayId: { type: integer, nullable: true }
        date: { type: string }
        equipment: { type: string }
        equipmentList:
          type: array
          nullable: true
          items: { type: string }
          description: |
            Ordered chip rail of every machine used in the logged session. The scalar `equipment` always equals `equipmentList[0]`. Nullable for legacy rows; clients should tolerate `null` (e.g. `equipmentList ?? [equipment]`).
        sessionType: { type: string }
        durationMin: { type: number, nullable: true }
        strengthMin:
          type: number
          nullable: true
          description: Actual lift / strength minutes for this logged session. Mirrors the prescribed `strengthMin` on the matching plan day so /today and /plan/:week can render plan-vs-actual per bucket. Null when the user hasn't supplied a breakdown yet (legacy rows fall back to `durationMin`).
        cardioMin:
          type: number
          nullable: true
          description: Actual non-running cross-train minutes (bike, row, spin). Does NOT include treadmill or outdoor running minutes — those live in `runMin`. Null when the user hasn't supplied a breakdown yet.
        runMin:
          type: number
          nullable: true
          description: Actual running minutes (treadmill or outdoor). Null when the user hasn't supplied a breakdown yet.
        totalMin:
          type: number
          nullable: true
          description: Sum of strengthMin, cardioMin, and runMin. Null when ALL three buckets are null (legacy row with only `durationMin` populated); otherwise nulls in individual buckets are treated as 0. Server-computed so the UI's TOTAL · LIFT · CARDIO · RUN tile is consistent with the same field on plan days.
        distanceMi: { type: number, nullable: true }
        pace: { type: string, nullable: true }
        avgHr: { type: integer, nullable: true }
        rpe: { type: integer, nullable: true }
        strengthLoad: { type: number, nullable: true }
        totalLoad: { type: number, nullable: true }
        notes: { type: string, nullable: true }
        timeOfDay:
          type: string
          enum: [AM, PM, Other]
          nullable: true
          description: Optional tag used to order and label same-day sessions. AM sorts before PM, PM before Other; rows with no tag fall back to createdAt order.
        modality:
          type: string
          enum: [Cardio, Strength, Mixed]
          nullable: true
          description: High-level modality of the session. Lets the user explicitly mark a workout as cardio, strength, or mixed independent of the more granular sessionType. Nullable for rows logged before this field existed.
        isCustomized:
          type: boolean
          description: Task #270. True when this logged workout has been edited at least once after it was first created (i.e. the seed_* snapshot is populated and at least one mutable field diverges from it).
        customizedFields:
          type: array
          items: { type: string }
          description: Task #270. camelCase field names whose current value differs from the snapshot taken at the time of the first edit. Empty when isCustomized is false.
        customizedDiff:
          type: array
          description: Task #270. Per-field before/after diff for the "Edited" badge popover on the Training Log. One entry per item in customizedFields (same order). Empty when isCustomized is false. Values are stringified — the UI applies field-specific formatting (e.g. distanceMi gets a "mi" suffix). null values mean the field had no original value or was cleared.
          items:
            type: object
            required: [field, before, after]
            properties:
              field: { type: string }
              before: { type: string, nullable: true }
              after: { type: string, nullable: true }
        prescribedRunTarget:
          nullable: true
          description: |
            Snapshot of the matched plan day's prescribed run target, populated by joining `planDayId` against `plan_days`. Lets the Training Log table render the user's chosen run-target line (effort / intervals / HR zone / pace) next to the actual results without the client having to fetch each plan day separately. Null when the workout has no `planDayId` (quick-logged Lifestyle activity, off-plan run) or when the referenced plan day no longer exists.
          type: object
          required: [sessionType, week, runMin, distanceMi, pace]
          properties:
            sessionType:
              type: string
              description: sessionType of the prescribed plan day (e.g. "Long Run", "Tempo"). Drives the intensity bucket the run target line falls into.
            week:
              type: integer
              description: 1-indexed campaign week of the prescribed plan day. Drives the walk/run interval recipe ramp in intervals mode.
            runMin: { type: number, nullable: true }
            distanceMi: { type: number, nullable: true }
            pace: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    CreateWorkoutBody:
      type: object
      required: [date, equipment, sessionType]
      properties:
        planDayId: { type: integer, nullable: true }
        date: { type: string }
        equipment: { type: string }
        equipmentList:
          type: array
          nullable: true
          items: { type: string }
          description: |
            Optional ordered chip rail of machines used. When omitted, the server stores `[equipment]`. When provided, the server validates `equipmentList[0] === equipment`.
        sessionType: { type: string }
        durationMin: { type: number, nullable: true }
        strengthMin: { type: number, nullable: true }
        cardioMin: { type: number, nullable: true }
        runMin: { type: number, nullable: true }
        distanceMi: { type: number, nullable: true }
        pace: { type: string, nullable: true }
        avgHr: { type: integer, nullable: true }
        rpe: { type: integer, nullable: true }
        strengthLoad: { type: number, nullable: true }
        totalLoad: { type: number, nullable: true }
        notes: { type: string, nullable: true }
        timeOfDay:
          type: string
          enum: [AM, PM, Other]
          nullable: true
        modality:
          type: string
          enum: [Cardio, Strength, Mixed]
          nullable: true

    UpdateWorkoutBody:
      type: object
      properties:
        date: { type: string }
        equipment: { type: string }
        equipmentList:
          type: array
          nullable: true
          items: { type: string }
          description: |
            Optional ordered chip rail of machines used. When `equipment` is also patched, the server validates `equipmentList[0] === equipment`. When only `equipmentList` is patched, the server rewrites the scalar to `equipmentList[0]`.
        sessionType: { type: string }
        durationMin: { type: number, nullable: true }
        strengthMin: { type: number, nullable: true }
        cardioMin: { type: number, nullable: true }
        runMin: { type: number, nullable: true }
        distanceMi: { type: number, nullable: true }
        pace: { type: string, nullable: true }
        avgHr: { type: integer, nullable: true }
        rpe: { type: integer, nullable: true }
        strengthLoad: { type: number, nullable: true }
        totalLoad: { type: number, nullable: true }
        notes: { type: string, nullable: true }
        timeOfDay:
          type: string
          enum: [AM, PM, Other]
          nullable: true
        modality:
          type: string
          enum: [Cardio, Strength, Mixed]
          nullable: true

    UnlinkedWorkoutsCount:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          description: Number of `workouts` rows where `plan_day_id IS NULL`. Zero when every logged workout has been retro-linked to a plan day (or when no workouts have been logged yet).

    Measurement:
      type: object
      required: [id, date, createdAt]
      properties:
        id: { type: integer }
        date: { type: string }
        weight: { type: number, nullable: true }
        lArm: { type: number, nullable: true }
        rArm: { type: number, nullable: true }
        lLeg: { type: number, nullable: true }
        rLeg: { type: number, nullable: true }
        belly: { type: number, nullable: true }
        chest: { type: number, nullable: true }
        neck: { type: number, nullable: true }
        bodyFatPct: { type: number, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    CreateMeasurementBody:
      type: object
      required: [date]
      properties:
        date: { type: string }
        weight: { type: number, nullable: true }
        lArm: { type: number, nullable: true }
        rArm: { type: number, nullable: true }
        lLeg: { type: number, nullable: true }
        rLeg: { type: number, nullable: true }
        belly: { type: number, nullable: true }
        chest: { type: number, nullable: true }
        neck: { type: number, nullable: true }
        bodyFatPct: { type: number, nullable: true }
        notes: { type: string, nullable: true }

    UpdateMeasurementBody:
      type: object
      properties:
        date: { type: string }
        weight: { type: number, nullable: true }
        lArm: { type: number, nullable: true }
        rArm: { type: number, nullable: true }
        lLeg: { type: number, nullable: true }
        rLeg: { type: number, nullable: true }
        belly: { type: number, nullable: true }
        chest: { type: number, nullable: true }
        neck: { type: number, nullable: true }
        bodyFatPct: { type: number, nullable: true }
        notes: { type: string, nullable: true }

    DashboardBootstrap:
      type: object
      description: |
        Task #383. Consolidated dashboard bootstrap payload — the
        server-side union of the 8 per-tile responses the dashboard
        first paint needs. Each field carries the exact same shape as
        its underlying single-endpoint response so the dashboard hook
        can hand each slice straight to the existing render code.
      required:
        [
          summary,
          weightTrend,
          weeklyMileage,
          equipmentUsage,
          longRunProgression,
          recentActivity,
          today,
          overview,
        ]
      properties:
        summary: { $ref: "#/components/schemas/DashboardSummary" }
        weightTrend:
          type: array
          items: { $ref: "#/components/schemas/WeightPoint" }
        weeklyMileage:
          type: array
          items: { $ref: "#/components/schemas/WeeklyMileagePoint" }
        equipmentUsage:
          type: array
          items: { $ref: "#/components/schemas/EquipmentUsage" }
        longRunProgression:
          type: array
          items: { $ref: "#/components/schemas/LongRunPoint" }
        recentActivity:
          type: array
          items: { $ref: "#/components/schemas/Workout" }
        today: { $ref: "#/components/schemas/TodayPlan" }
        overview: { $ref: "#/components/schemas/PlanOverview" }

    RecompSite:
      type: object
      description: |
        Phase 4. One circumference-tape site in the body-recomp story.
        belly/chest are fat-loss sites (shrinking = fat off); arms/legs
        are lean-mass PROXY sites (growth there reads as muscle). `delta`
        is baseline - latest (positive = the site shrank).
      required: [key, label, muscleProxy, baseline, latest, delta, series]
      properties:
        key:
          type: string
          enum: [belly, chest, arms, legs]
        label: { type: string }
        muscleProxy:
          type: boolean
          description: True for arms/legs — growth here is treated as a lean-mass proxy.
        baseline:
          type: number
          nullable: true
          description: Earliest non-null reading for this site (null if none).
        latest:
          type: number
          nullable: true
          description: Most-recent non-null reading for this site (null if none).
        delta:
          type: number
          nullable: true
          description: baseline - latest. Positive = shrank, negative = grew. Null if no reading.
        series:
          type: array
          description: Chronological non-null date+value points for the per-site sparkline.
          items:
            type: object
            required: [date, value]
            properties:
              date: { type: string }
              value: { type: number }

    RecompSummary:
      type: object
      description: |
        Phase 4. Server-computed body-recomposition summary. The dashboard
        LEADS with "inches lost" + a muscle/strength proxy rather than
        weight or races. All fields are guarded for the no-data /
        single-measurement case (zeros / nulls, never NaN).
      required:
        [
          measurementCount,
          sites,
          totalInchesLost,
          muscleProxyInchesGained,
          strengthScoreCurrent,
          strengthScoreGoal,
          weightBaseline,
          weightLatest,
          onTrack,
        ]
      properties:
        measurementCount:
          type: integer
          description: Distinct measurement rows. 0 = empty (show the log-first empty), 1 = baseline-only (deltas are 0).
        sites:
          type: array
          items: { $ref: "#/components/schemas/RecompSite" }
        totalInchesLost:
          type: number
          description: Σ of REDUCTIONS (positive baseline-latest) across all four sites.
        muscleProxyInchesGained:
          type: number
          description: Σ of GROWTH (positive latest-baseline) across the arm + leg sites only.
        strengthScoreCurrent:
          type: integer
          nullable: true
          description: Tonal Strength Score, current (entered on Goals). Null until set.
        strengthScoreGoal:
          type: integer
          nullable: true
          description: Tonal Strength Score, goal. Null until set.
        weightBaseline:
          type: number
          nullable: true
          description: Earliest non-null weight. Weight renders secondary on the new hero.
        weightLatest:
          type: number
          nullable: true
          description: Most-recent non-null weight.
        onTrack:
          type: boolean
          description: >
            Combined recomp verdict — inches trending down AND (strength
            climbing toward goal OR an arm/leg proxy growing). False on
            empty / single-measurement.

    DashboardSummary:
      type: object
      required:
        [
          hasPlan,
          currentWeek,
          currentPhase,
          weekProgressPct,
          weeklyMilesActual,
          weeklyMilesPlanned,
          weeklyLoadActual,
          weeklyLoadPlanned,
          weeklySessionsCompleted,
          weeklySessionsPlanned,
          weeklyLifestyleMinutes,
          prevFourWeekAvgLifestyleMinutes,
          totalMilesAllTime,
          longestRunMi,
          weightStart,
          weightCurrent,
          weightGoal,
          weightLost,
          weightToGoal,
          adherencePct,
          daysToRace,
          programs,
          activeConfigName,
          recomp,
        ]
      properties:
        recomp:
          $ref: "#/components/schemas/RecompSummary"
        hasPlan:
          type: boolean
          description: |
            Task #307. False when no Phase Planner config has ever been
            applied (fresh installs / after a Full Reset against an empty
            `planner_configs`). Drives the dashboard's "Open Phase
            Planner" empty state for plan-driven tiles. Body Mass /
            Recent Logs / Equipment tiles remain visible even when false.
        currentWeek: { type: integer }
        currentPhase: { type: string }
        weekProgressPct: { type: number }
        weeklyMilesActual: { type: number }
        weeklyMilesPlanned: { type: number }
        weeklyLoadActual: { type: number }
        weeklyLoadPlanned: { type: number }
        weeklySessionsCompleted: { type: integer }
        weeklySessionsPlanned: { type: integer }
        weeklyLifestyleMinutes: { type: number }
        prevFourWeekAvgLifestyleMinutes:
          type: number
          nullable: true
          description: >
            Task #34. Average lifestyle minutes per plan_week across the 4
            weeks immediately preceding the active plan_week. Null when
            fewer than 4 prior plan_weeks exist (early-campaign / pre-launch),
            so the dashboard hides the trend indicator until there is enough
            history. Used by the Week Snapshot card to show whether the
            current week's lifestyle minutes are trending up, down, or flat
            against the runner's recent baseline.
        totalMilesAllTime: { type: number }
        longestRunMi: { type: number }
        weightStart:
          type: number
          nullable: true
          description: |
            Task #330. Body-mass start target (lbs). Mirrors
            `PlanOverview.startWeight` — sourced from the
            most-recently-applied planner config's `appliedStartWeight`,
            falling back to the runner's earliest measurement weight,
            then to null. The Body Mass tile renders an em-dash when
            both this and `weightCurrent` are null.
        weightCurrent: { type: number, nullable: true }
        weightGoal:
          type: number
          nullable: true
          description: |
            Task #330. Body-mass goal target (lbs). Mirrors
            `PlanOverview.goalWeight` — sourced from the
            most-recently-applied planner config's `appliedGoalWeight`.
            NULL when the runner hasn't set a goal; the Body Mass
            tile renders an em-dash sentinel in that case.
        weightLost:
          type: number
          description: |
            (weightStart - weightCurrent), clamped to >= 0. Zero when
            either side is null.
        weightToGoal:
          type: number
          description: |
            (weightCurrent - weightGoal), clamped to >= 0. Zero when
            either side is null.
        adherencePct: { type: number }
        daysToRace: { type: integer }
        activeConfigName:
          type: string
          description: |
            Task #244. Display name of the currently-active planner
            config (mirrors `PlanOverview.activeConfigName`). Drives
            the dashboard header title so the runner sees their own
            plan name instead of a hardcoded "Half Marathon Campaign".
            Falls back to "Workout Plan" when no config has ever been
            applied.
        programs:
          type: array
          description: >
            Task #144. Per-program breakdown of the current week's planned and
            actual training load for runners stacking concurrent programs (e.g.
            a Tonal lift program alongside a 5K running program). Each program
            corresponds to one TemplateEntry currently contributing rows to
            plan_days. Headline weekly* fields above are the COMBINED totals
            across all programs; this array lets the dashboard drill in to
            per-program totals. Always present — for legacy single-program
            campaigns it contains exactly one element labelled "Marathon Plan".
            Task #159: programs are ordered by `endDate` ascending (closest race
            date first), with `sourceEntryIndex` ascending as the tiebreaker, so
            the most-imminent program surfaces at the top of the Week Snapshot.
          items: { $ref: "#/components/schemas/DashboardSummaryProgram" }
        raceKind:
          type: string
          enum: [marathon, half, "10k", "5k"]
          nullable: true
          description: |
            Task #209. Kind of race the campaign is anchored on, derived
            from the trailing plan_day Sunday — same detection logic as
            `PlanOverview.raceKind` (Task #204) so the dashboard header
            and race-week banner stay in lock-step with /plan. Populated
            when that final row is a recognised race day (sessionType
            `Race` or the generator's "RACE DAY — <Marathon|Half|10K|5K>"
            description prefix); resolved from the description first so
            a runner who edits the distance still gets the right kind,
            then falls back to `distance_mi`. Null on tonal-first /
            non-race plans (lift_primary blocks, ad-hoc Custom blocks)
            and on legacy / freshly seeded campaigns with no plan_days
            yet — the dashboard header keeps generic copy in those cases
            so we don't presuppose a race. Drives the "Race Campaign" /
            per-kind ("5K Campaign", "10K Campaign", "Half Marathon
            Campaign") framing on the dashboard header and the
            RaceWeekBanner countdown / post-race copy.

    DashboardSummaryProgram:
      type: object
      required:
        [
          sourceEntryIndex,
          label,
          endDate,
          weeklyMilesPlanned,
          weeklyMilesActual,
          weeklyLoadPlanned,
          weeklyLoadActual,
          weeklySessionsPlanned,
          weeklySessionsCompleted,
          adherencePlanned,
          adherenceCompleted,
          adherencePct,
        ]
      properties:
        sourceEntryIndex:
          type: integer
          description: Stable identifier for this program within the active planner config (0..N-1).
        label:
          type: string
          description: Human-readable program name (entry.customName or template name); falls back to "Marathon Plan" for legacy single-program campaigns.
        endDate:
          type: string
          description: >
            ISO yyyy-mm-dd. Last calendar date this program contributes a
            plan_day on. Programs in an entries-mode config can finish before
            the campaign marathonDate (e.g. a 5K Improver block that ends 12
            weeks before race day) — this field surfaces that explicitly so
            the dashboard can show "Tonal Lift ends 2027-01-15" alongside the
            campaign marathon date.
        weeklyMilesPlanned: { type: number }
        weeklyMilesActual:
          type: number
          description: >
            Sum of `distance_mi` from logged workouts whose plan_day_id links
            back to one of this program's plan_days in the current week.
            Workouts that were never linked to a specific plan_day (e.g.
            unplanned cross-train) only contribute to the combined headline
            number.
        weeklyLoadPlanned: { type: number }
        weeklyLoadActual: { type: number }
        weeklySessionsPlanned: { type: integer }
        weeklySessionsCompleted: { type: integer }
        adherencePlanned:
          type: integer
          description: >
            Task #162. Non-rest plan_days for this program from campaign
            start through today (inclusive). Drives the per-program
            adherence slice on the dashboard so a runner stacking a
            Tonal lift program alongside a 5K running program can spot
            which program is dragging the combined `adherencePct` down.
        adherenceCompleted:
          type: integer
          description: >
            Task #162. Subset of `adherencePlanned` for this program
            that has at least one logged (non-Skipped) workout
            attributed to it via plan_day_id (or, for legacy workouts
            with no plan_day_id, a same-date match).
        adherencePct:
          type: number
          description: >
            Task #162. `adherenceCompleted / adherencePlanned * 100`,
            clamped to [0, 100]. Returns 0 when `adherencePlanned` is
            0 (program hasn't started yet).

    WeightPoint:
      type: object
      required: [date, weight]
      properties:
        date: { type: string }
        weight: { type: number }

    WeeklyMileagePoint:
      type: object
      required:
        [
          week,
          plannedMiles,
          actualMiles,
          plannedCardioMin,
          actualCardioMin,
          programs,
        ]
      properties:
        week: { type: integer }
        startDate: { type: string }
        phase: { type: string }
        plannedMiles: { type: number }
        actualMiles: { type: number }
        plannedCardioMin:
          type: number
          description: >
            Total planned cross-train cardio minutes for the week
            (bike / row / spin etc., not running). Lets the dashboard
            chart show non-zero bars for bike-only or row-only weeks
            whose `plannedMiles` is 0.
        actualCardioMin:
          type: number
          description: >
            Sum of `cardio_min` across logged workouts dated within
            the week.
        dominantCardioEquipment:
          type: string
          nullable: true
          description: >
            Equipment with the most planned cardio minutes for the
            week, used to label cardio-only weeks in the chart tooltip
            (e.g. "Peloton Bike"). Null when the week has no planned
            cross-train cardio.
        programs:
          type: array
          description: >
            Task #144. Per-program breakdown of this week's planned miles and
            cardio minutes. The headline `plannedMiles` / `plannedCardioMin`
            above are the COMBINED totals across overlapping programs (a
            Tonal lift program stacked with a 5K running program for
            example); this array lets the chart tooltip drill in to per-
            program contributions. Empty for weeks where no program
            contributes plan_days (e.g. interior recovery gaps that only
            carry synthetic filler rows). Task #159: programs are ordered by
            their campaign-wide end date ascending (closest race date first),
            with `sourceEntryIndex` ascending as the tiebreaker, so the
            chart tooltip surfaces the most-imminent program at the top.
          items: { $ref: "#/components/schemas/WeeklyMileageProgram" }
        wedSteady:
          type: boolean
          nullable: true
          description: |
            Task #183. True when this week's Wednesday plan day is a
            Steady (Z3) Run + Accessory session — i.e. the same gating
            the Plan Calendar week strip and the Plan Preview
            MileageCurve already use (sourced from
            `plan_days.session_type`, so customizations that swap Wed
            away from steady drop the flag immediately). Drives the
            amber-400 "Steady Wed" marker on the dashboard mileage
            chart so a runner sees at a glance which weeks earn the
            Z3 stimulus. Null on weeks with no Wed plan day yet
            (freshly seeded / legacy data).

    WeeklyMileageProgram:
      type: object
      required: [sourceEntryIndex, label, plannedMiles, plannedCardioMin]
      properties:
        sourceEntryIndex: { type: integer }
        label:
          type: string
          description: Human-readable program name; falls back to "Marathon Plan" for legacy single-program campaigns.
        plannedMiles: { type: number }
        plannedCardioMin: { type: number }

    EquipmentUsage:
      type: object
      required:
        [
          equipment,
          sessions,
          totalMinutes,
          totalLoad,
          totalDistance,
          plannedSessions,
          plannedMinutes,
          plannedLoad,
          plannedDistance,
          plannedToDateSessions,
          plannedToDateMinutes,
          plannedToDateLoad,
          plannedToDateDistance,
          byProgram,
        ]
      properties:
        equipment: { type: string }
        sessions: { type: integer }
        totalMinutes: { type: number }
        totalLoad: { type: number }
        totalDistance: { type: number }
        plannedSessions: { type: integer }
        plannedMinutes: { type: number }
        plannedLoad: { type: number }
        plannedDistance: { type: number }
        plannedToDateSessions:
          type: integer
          description: Planned non-rest sessions for this machine on or before today. Use to compare actuals against the share of the plan that should have happened so far rather than the full campaign.
        plannedToDateMinutes:
          type: number
          description: Planned cardio minutes for this machine on or before today.
        plannedToDateLoad:
          type: number
          description: Planned total load for this machine on or before today.
        plannedToDateDistance:
          type: number
          description: Planned distance (mi) for this machine on or before today.
        byProgram:
          type: array
          description: >
            Task #144. Per-program attribution of this machine's planned
            workload. Lets the /equipment page (and the dashboard Arsenal
            tile) split a machine's planned minutes between concurrent
            programs — e.g. Tonal might be 80% Tonal Lift program and 20%
            5K Improver cross-train. The headline `plannedSessions` /
            `plannedMinutes` / `plannedLoad` / `plannedDistance` above are
            the COMBINED totals across all programs that schedule this
            machine; this array sums to those totals. Empty when no
            program schedules the machine (i.e. unplanned actuals only).
            Programs are ordered by sourceEntryIndex ascending.
          items: { $ref: "#/components/schemas/EquipmentUsageProgram" }

    EquipmentUsageProgram:
      type: object
      required:
        [sourceEntryIndex, label, plannedSessions, plannedMinutes, plannedLoad, plannedDistance]
      properties:
        sourceEntryIndex: { type: integer }
        label:
          type: string
          description: Human-readable program name; falls back to "Marathon Plan" for legacy single-program campaigns.
        plannedSessions: { type: integer }
        plannedMinutes: { type: number }
        plannedLoad: { type: number }
        plannedDistance: { type: number }

    EquipmentPhaseSummary:
      type: object
      description: Phase-by-phase planned and actual session counts per machine. `phases` is the ordered list of phase names across the campaign; each row's `counts` and `actualCounts` arrays are parallel to `phases`.
      required: [phases, rows]
      properties:
        phases:
          type: array
          items: { type: string }
        rows:
          type: array
          items: { $ref: "#/components/schemas/EquipmentPhaseRow" }

    EquipmentPhaseRow:
      type: object
      required: [equipment, counts, actualCounts, plannedToDateCounts, total, actualTotal]
      properties:
        equipment: { type: string }
        counts:
          type: array
          description: Planned non-rest sessions per phase, in the same order as `phases`.
          items: { type: integer }
        actualCounts:
          type: array
          description: Logged workouts per phase (matched by workout date falling inside the phase's plan weeks), in the same order as `phases`.
          items: { type: integer }
        plannedToDateCounts:
          type: array
          description: Planned non-rest sessions per phase whose date is on or before today, in the same order as `phases`. Use to detect phases the athlete has fallen behind on (compare `actualCounts[i]` against `plannedToDateCounts[i]`). A value of 0 means the phase is entirely in the future and should not be flagged.
          items: { type: integer }
        total: { type: integer }
        actualTotal:
          type: integer
          description: Sum of `actualCounts` across all phases.

    LongRunPoint:
      type: object
      required: [week, plannedMi, actualMi]
      properties:
        week: { type: integer }
        date: { type: string }
        phase: { type: string }
        plannedMi: { type: number }
        actualMi: { type: number }
        cardioMin:
          type: number
          nullable: true
          description: Total actual cardio minutes logged across the whole plan week (sum of `workouts.cardio_min`). Null when no cardio was logged that week. Kept for back-compat — prefer `actualCardioMin` for new code.
        plannedCardioMin:
          type: number
          description: Total planned cross-train cardio minutes for the whole plan week (sum of `plan_days.cardio_min`). Drives the secondary-axis bar on the Long Run Build chart so cross-train-only weeks (no Long Run / Race) still render a visible bar.
        actualCardioMin:
          type: number
          description: Total actual cardio minutes logged across the whole plan week. Same value as `cardioMin` but always a number (0 instead of null).

    RaceWeekChecklistItem:
      type: object
      required: [itemId, label, checked, isCustom]
      properties:
        itemId: { type: string }
        label: { type: string }
        checked: { type: boolean }
        checkedAt: { type: string, format: date-time, nullable: true }
        isCustom:
          type: boolean
          description: True for user-created items (which can be deleted). False for built-in default items.

    RaceWeekRacePlan:
      type: object
      required: [distanceMi, description]
      properties:
        distanceMi: { type: number }
        targetPace: { type: string, nullable: true }
        fuelingNote: { type: string, nullable: true }
        description: { type: string }

    RaceWeekStatus:
      type: object
      required: [raceDate, daysToRace, hoursToRace, inWindow, isRaceDay, racePassed, checklist, uncheckedCount]
      properties:
        raceDate:
          type: string
          nullable: true
          description: ISO yyyy-mm-dd of the runner's APPLIED marathon date. Null when the active planner config is in date-optional / workout-planner mode (Task #379) — daysToRace/hoursToRace collapse to 0 and inWindow/isRaceDay/racePassed are all false.
        daysToRace: { type: integer }
        hoursToRace: { type: integer }
        inWindow: { type: boolean }
        isRaceDay: { type: boolean }
        racePassed:
          type: boolean
          description: True when the race date is in the past and the runner is in the post-race recovery window.
        daysAfterRace:
          type: integer
          nullable: true
          description: Number of days since race day. Null when race has not yet passed.
        racePlan:
          allOf:
            - $ref: "#/components/schemas/RaceWeekRacePlan"
          nullable: true
        raceResult:
          allOf:
            - $ref: "#/components/schemas/RaceResult"
          nullable: true
          description: |
            The runner's logged race-day result, or null if no result has been
            captured yet. Only ever populated once `racePassed` is true; the
            UI uses this to switch the post-race recovery banner between an
            empty "Log your race" form and a "saved result" summary card.
        checklist:
          type: array
          items: { $ref: "#/components/schemas/RaceWeekChecklistItem" }
        uncheckedCount:
          type: integer
          minimum: 0
          description: |
            Task #39. Count of taper checklist items still unchecked. Used by
            the dashboard header and Today page to render a compact reminder
            badge during race week. Falls to 0 once everything is checked, so
            the UI can hide the nudge without recomputing client-side.

    RaceResult:
      type: object
      required: [raceDate, recordedAt, updatedAt]
      properties:
        raceDate: { type: string }
        finishTime:
          type: string
          nullable: true
          description: Free-form finish time string (e.g. "2:14:08").
        placementOverall:
          type: integer
          nullable: true
        placementTotal:
          type: integer
          nullable: true
          description: Total field size, used together with placementOverall (e.g. 312 of 1804).
        feltRating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
          description: 1-5 self-rating of how the race felt (1 = brutal, 5 = nailed it).
        notes:
          type: string
          nullable: true
        raceKind:
          type: string
          nullable: true
          enum: [marathon, half, "10k", "5k"]
          description: |
            Task #265. Captured at write time from the active plan_day at the
            race date so PR comparisons across past campaigns survive Phase
            Planner re-applies. The /races history endpoint (Task #266)
            falls back to a `plan_days` lookup on the same date via
            `detectRaceKind` for legacy rows where the persisted column is
            still null. Null for legacy rows whose plan_day is also gone or
            unrecognised.
        previousBest:
          allOf:
            - $ref: "#/components/schemas/RaceResultPreviousBest"
          nullable: true
          description: |
            Task #265. The fastest prior `race_results` row sharing this
            row's `raceKind` (excluding the current row), used by the
            post-race banner to render the PR badge + "−1:43 vs prior best
            2:15:51" comparison line. Null when there's no prior result of
            this kind, when this row has no `raceKind`, or when this row's
            `finishTime` can't be parsed.
        isPersonalRecord:
          type: boolean
          description: |
            Task #265. True when this finish time is strictly faster than
            every prior `race_results` row of the same `raceKind`. False on
            first-of-kind rows (nothing to beat yet), on ties, and on rows
            with an unparseable `finishTime` or null `raceKind`.
        recordedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    RaceResultPreviousBest:
      type: object
      required: [raceDate, finishTime, deltaSeconds]
      properties:
        raceDate: { type: string }
        finishTime: { type: string }
        deltaSeconds:
          type: integer
          description: |
            `currentSeconds - previousBestSeconds`. Negative when this
            finish beats the prior best (a PR); positive when slower.

    ScheduledRace:
      type: object
      required: [raceDate, raceKind, recordedAt, updatedAt]
      properties:
        raceDate: { type: string }
        raceKind:
          type: string
          enum: [marathon, half, "10k", "5k"]
        name:
          type: string
          nullable: true
          description: Optional human-readable name (e.g. "Brooklyn Mile 5K").
        notes:
          type: string
          nullable: true
        hasResult:
          type: boolean
          description: |
            True when a `race_results` row already exists for this
            scheduled race's date. Lets the /races UI render a "Log
            result" CTA only on past, unlogged races.
        recordedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    NextScheduledRace:
      type: object
      required: [raceDate, raceKind, recordedAt, updatedAt, daysUntil]
      description: |
        Task #345. Embedded shape for the closest upcoming scheduled
        race surfaced on /plan/overview and /plan/today. Same wire
        shape as `ScheduledRace` plus a server-computed `daysUntil`
        delta from the API server's UTC `today` (0 on race day) so
        clients don't have to recompute it from `raceDate`.
      properties:
        raceDate: { type: string }
        raceKind:
          type: string
          enum: [marathon, half, "10k", "5k"]
        name: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        hasResult: { type: boolean }
        recordedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        daysUntil:
          type: integer
          description: |
            Whole days from the server's UTC `today` to `raceDate`.
            0 on the race day itself; never negative because the
            picker only returns races with `raceDate >= today`.

    CreateScheduledRaceBody:
      type: object
      required: [raceDate, raceKind]
      properties:
        raceDate:
          type: string
          description: ISO yyyy-mm-dd race date. Primary key.
        raceKind:
          type: string
          enum: [marathon, half, "10k", "5k"]
        name: { type: string, nullable: true }
        notes: { type: string, nullable: true }

    UpdateScheduledRaceBody:
      type: object
      properties:
        raceKind:
          type: string
          enum: [marathon, half, "10k", "5k"]
        name: { type: string, nullable: true }
        notes: { type: string, nullable: true }

    SetRaceResultBody:
      type: object
      properties:
        finishTime: { type: string, nullable: true }
        placementOverall:
          type: integer
          nullable: true
          minimum: 1
          description: 1-based finish position. Must be a positive integer.
        placementTotal:
          type: integer
          nullable: true
          minimum: 1
          description: Total field size. Must be a positive integer.
        feltRating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        notes: { type: string, nullable: true }

    SetRaceWeekChecklistItemBody:
      type: object
      required: [checked]
      properties:
        checked: { type: boolean }

    CreateRaceWeekChecklistItemBody:
      type: object
      required: [label]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-readable label for the new custom checklist item.

    DeleteRaceWeekChecklistItemResponse:
      type: object
      required: [itemId, deleted]
      properties:
        itemId: { type: string }
        deleted: { type: boolean }

    PhaseBlock:
      type: object
      description: |
        One block in the runner's Phase Planner config. The trailing 16-week
        Marathon-Specific block is auto-pinned at generation time and is NOT
        present in the user-defined `blocks` array; users only pick the
        blocks that come BEFORE the auto-pinned tail.
      required: [focusType, weeks]
      properties:
        focusType:
          type: string
          enum:
            - Base
            - Time on Feet
            - Cardio + Weight Loss
            - Speed
            - Marathon-Specific
            - Taper
            - Recovery
            - C25K
            - Custom
        weeks:
          type: integer
          minimum: 1
        customName:
          type: string
          nullable: true
          description: Required when focusType is "Custom"; ignored otherwise. Used as the phase label on plan_weeks/plan_days for that block.
        customNotes:
          type: string
          nullable: true
          description: Optional free-text appended in `[brackets]` to every plan_day description in this block (handy for marking experiments, "extra recovery", etc.).

    PlannerConfig:
      type: object
      required: [id, name, isActive, startDate, marathonDate, blocks, startWeight, goalWeight, startingPaceSec, goalEndingPaceSec, dailyBudget]
      properties:
        id:
          type: integer
          description: Server-assigned identifier. Stable across renames.
        name:
          type: string
          description: Human-friendly label shown in the config dropdown.
        isActive:
          type: boolean
          description: True if this is the config that POST /planner/apply will operate on.
        startDate:
          type: string
          description: ISO yyyy-mm-dd; week 1 begins on this date. Must be a Monday.
        marathonDate:
          type: string
          nullable: true
          description: ISO yyyy-mm-dd; race / final day. When set, must be a Sunday and the dates must form a whole number of Mon..Sun weeks. In legacy blocks-mode (when set) it must be at least 16 weeks after startDate (the auto-pinned Marathon-Specific tail). In entries-mode (when set) it must equal sum(entries.weeks) weeks after startDate. **Task #379**: nullable for date-optional / workout-planner mode — when null the campaign has no pinned race day and totalWeeks is derived from sum(entries.weeks) (entries-mode) or sum(blocks.weeks) (blocks-mode, no auto-pinned tail).
        blocks:
          type: array
          items: { $ref: "#/components/schemas/PhaseBlock" }
          description: In legacy mode, the user-edited PhaseBlock list (auto-pinned 16-week tail appended at generation time). In entries-mode, the server-computed projection of `entries` for downstream consumers.
        entries:
          type: array
          nullable: true
          description: Ordered list of TemplateEntry objects. When non-null, entries are the source of truth for the editor; the server projects entries → blocks on every write. Sum of entry weeks must equal totalWeeks (no auto-pinned tail). NULL for legacy blocks-only configs.
          items: { $ref: "#/components/schemas/TemplateEntry" }
        notes:
          type: string
          nullable: true
        startWeight:
          type: number
          nullable: true
          description: |
            Task #330. Optional body-mass start target (lbs). NULL when
            the runner doesn't want to track a start weight on this
            config. When non-null, surfaces on the dashboard's Body
            Mass tile and the /plan header instead of the legacy
            hardcoded 281.6 constant.
        startingPaceSec:
          type: integer
          nullable: true
          description: Optional runner-prescribed starting easy pace (sec/mi). NULL falls back to the default 870 sec/mi (14:30/mi). Ramps ~30 sec/mi per 8 weeks toward the recipe floor; paces slower than 840 sec/mi (14:00/mi) trigger a Peloton walk-run prescription for the first ~2 entry-local weeks.
        goalEndingPaceSec:
          type: integer
          nullable: true
          description: |
            Task #373. Optional goal ending easy pace (sec/mi). When BOTH
            startingPaceSec and goalEndingPaceSec are set, the generator
            linearly interpolates easy pace from start (campaign week 1)
            to goal (final week) instead of using the fixed-rate
            ~3.75 sec/mi/week ramp. NULL preserves the legacy fixed-rate
            ramp behavior. Recipe floors and race-kind offsets still
            layer on top of the interpolated value.
        dailyBudget:
          type: object
          nullable: true
          description: |
            Optional per-runner override of the FIXED-cadence daily
            time-budget contract. Canonical fields: shortDayMin/shortDayMax
            (Tue-Thu, default 30/50) and longDayMin/longDayMax (Fri-Sun,
            default 60/90). Monday is always full rest (0) and is not
            configurable. The legacy weekdayMin/weekdayMax/weekendMin fields
            are retained for back-compat reads of pre-overhaul stored configs
            and are folded into the new buckets server-side. Each field is
            capped at 180 min; the route layer enforces floor <= cap per
            window so impossible windows can't be saved.
          properties:
            shortDayMin:
              type: integer
              nullable: true
              minimum: 1
              maximum: 180
            shortDayMax:
              type: integer
              nullable: true
              minimum: 1
              maximum: 180
            longDayMin:
              type: integer
              nullable: true
              minimum: 1
              maximum: 180
            longDayMax:
              type: integer
              nullable: true
              minimum: 1
              maximum: 180
            weekdayMin:
              type: integer
              nullable: true
              minimum: 1
              maximum: 180
            weekdayMax:
              type: integer
              nullable: true
              minimum: 1
              maximum: 180
            weekendMin:
              type: integer
              nullable: true
              minimum: 1
              maximum: 180
        goalWeight:
          type: number
          nullable: true
          description: |
            Task #330. Optional body-mass goal target (lbs). NULL when
            the runner doesn't want to track a goal weight on this
            config. When non-null, surfaces on the dashboard's Body
            Mass tile and the /plan header instead of the legacy
            hardcoded 210 constant.
        updatedAt:
          type: string
          format: date-time
          description: Server-set timestamp for the most recent write. Read-only — ignored on writes.
        lastAppliedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent /planner/apply that pivoted on this config. NULL if it has never been applied.

    TemplateEntry:
      type: object
      required: [templateId, weeks]
      description: A single composed entry inside an entries-mode PlannerConfig. References a plan template by id and supplies the runner-chosen week count for that template.
      properties:
        templateId:
          type: string
          description: Identifier of an entry in PLAN_TEMPLATES (e.g. "half_marathon", "marathon", "aerobic_base"). Unknown ids are rejected at validation.
        weeks:
          type: integer
          minimum: 1
          description: Number of weeks this entry's template should expand to. Must be a positive integer within the referenced template's published min/max range — out-of-range values are rejected at validation.
        customName:
          type: string
          nullable: true
          description: Optional runner-friendly label for this composition entry; merged into the first expanded block's customName.
        customNotes:
          type: string
          nullable: true
          description: Optional per-entry note merged into every expanded block's customNotes so the runner-supplied context surfaces in the daily plan.
        startDate:
          type: string
          nullable: true
          description: Optional ISO yyyy-mm-dd Monday on which this entry begins. When omitted (null), the entry stacks immediately after the previous entry. When set later than the running cursor, the gap is bridged with a Recovery filler block (sum of entry weeks + gap weeks must still equal totalWeeks). The first entry's startDate, when set, must equal the config's startDate. Overlapping entries (startDate before the previous entry's end) are rejected at validation.

    PlanTemplateMetadata:
      type: object
      required:
        [
          intensityDistribution,
          peakLongRun,
          peakWeeklyVolume,
          taperLength,
          cutbackCadence,
          mandatoryRestDays,
          equipmentMixHint,
        ]
      properties:
        intensityDistribution: { type: string }
        peakLongRun: { type: string }
        peakWeeklyVolume: { type: string }
        taperLength: { type: string }
        cutbackCadence: { type: string }
        mandatoryRestDays: { type: integer }
        equipmentMixHint: { type: string }

    PlanTemplate:
      type: object
      required:
        [
          id,
          name,
          goalDistance,
          source,
          citation,
          shortDescription,
          longDescription,
          minWeeks,
          maxWeeks,
          defaultWeeks,
          metadata,
          tags,
          level,
        ]
      properties:
        id: { type: string }
        name: { type: string }
        goalDistance: { type: string }
        source:
          type: string
          description: Originating coach / methodology (e.g. "Hal Higdon", "Pete Pfitzinger").
        citation:
          type: string
          description: Concrete reference (book + edition / URL) for the source.
        shortDescription: { type: string }
        longDescription: { type: string }
        minWeeks: { type: integer }
        maxWeeks: { type: integer }
        defaultWeeks: { type: integer }
        metadata: { $ref: "#/components/schemas/PlanTemplateMetadata" }
        tags:
          type: array
          description: Lightweight, runner-facing topic tags surfaced as chips on the template card and matched by the planner's free-text filter (e.g. "polarized", "hill focus", "low-mileage", "first-timer").
          items: { type: string }
        level:
          type: string
          enum: [Beginner, Intermediate, Advanced]
          description: "Skill-level bucket used to group templates in the picker."

    StarterShortcut:
      type: object
      required: [id, name, description, style, entries]
      description: One-click shortcut that seeds an ordered composition of TemplateEntry objects (e.g. an Aerobic Base lead-in followed by a race-specific template) for a common goal/duration pairing.
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        style:
          type: string
          enum: [run_only, hybrid]
          description: "Training-style bucket used to group starter shortcuts on the planner rail. `run_only` shortcuts compose only run-only templates; `hybrid` shortcuts include at least one concurrent lift+run template."
        entries:
          type: array
          minItems: 1
          items:
            type: object
            required: [templateId, weeks]
            properties:
              templateId: { type: string }
              weeks: { type: integer }

    PlannerTemplatesResponse:
      type: object
      required: [templates, starters]
      properties:
        templates:
          type: array
          items: { $ref: "#/components/schemas/PlanTemplate" }
        starters:
          type: array
          items: { $ref: "#/components/schemas/StarterShortcut" }

    PlannerConfigSummary:
      type: object
      description: Lightweight row used by the configs dropdown.
      required: [id, name, isActive, startDate, marathonDate, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        isActive: { type: boolean }
        startDate: { type: string }
        marathonDate: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }
        lastAppliedAt: { type: string, format: date-time, nullable: true }

    ListPlannerConfigsResponse:
      type: object
