openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Marathon Command Center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: plan
  - name: workouts
  - name: measurements
  - name: dashboard
  - name: race-week
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /plan/overview:
    get:
      operationId: getPlanOverview
      tags: [plan]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanOverview" }

  /plan/weeks:
    get:
      operationId: listPlanWeeks
      tags: [plan]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlanWeek" }

  /plan/weeks/{week}:
    get:
      operationId: getPlanWeek
      tags: [plan]
      parameters:
        - in: path
          name: week
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanWeekDetail" }
        "404":
          description: Plan week not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/days/{id}:
    patch:
      operationId: updatePlanDay
      tags: [plan]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePlanDayBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanDay" }
        "400":
          description: Invalid id or request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Plan day not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/days/{id}/swap:
    post:
      operationId: swapPlanDay
      tags: [plan]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SwapPlanDayBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SwapPlanDayResponse" }
        "400":
          description: Invalid id or request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Plan day not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/days/{id}/reset:
    post:
      operationId: resetPlanDay
      tags: [plan]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanDay" }
        "400":
          description: Invalid id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Plan day not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/weeks/{week}/reset:
    post:
      operationId: resetPlanWeek
      tags: [plan]
      description: Restore every plan day in the given week back to its seeded prescription. Days that have never been edited are left alone. Logged workouts are not touched.
      parameters:
        - in: path
          name: week
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResetPlanWeekResponse" }
        "400":
          description: Invalid week number
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Plan week not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/reset:
    post:
      operationId: resetPlan
      tags: [plan]
      description: Restore every plan day in the entire 52-week plan back to its seeded prescription. Days that have never been edited are left alone. Logged workouts are not touched.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResetPlanResponse" }

  /plan/full-reset:
    post:
      operationId: fullResetPlan
      tags: [plan]
      description: |
        Nuclear reset. TRUNCATEs and reseeds plan_weeks and plan_days from the
        canonical generator (clearing every customization), and wipes every
        logged workout, every body measurement (re-inserting only the seeded
        baseline row), the race-week checklist, and any pending reset-undo
        snapshots. There is no undo for this operation. Use only when the user
        wants to start the campaign over from day one.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FullResetPlanResponse" }

  /plan/reset/undo:
    post:
      operationId: undoPlanReset
      tags: [plan]
      description: Restore the plan days that were just wiped by the most recent week-reset or plan-reset call. The undo token is only valid for a short window (~30 seconds) after the reset; after that the snapshot is dropped and the call returns 404.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UndoPlanResetBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UndoPlanResetResponse" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Undo token not found or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /plan/today:
    get:
      operationId: getTodayPlan
      tags: [plan]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TodayPlan" }

  /workouts:
    get:
      operationId: listWorkouts
      tags: [workouts]
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: from
          schema: { type: string }
        - in: query
          name: to
          schema: { type: string }
        - in: query
          name: equipment
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Workout" }
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }
    post:
      operationId: createWorkout
      tags: [workouts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWorkoutBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workout" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /workouts/{id}:
    patch:
      operationId: updateWorkout
      tags: [workouts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateWorkoutBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workout" }
        "400":
          description: Invalid id or request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Workout not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteWorkout
      tags: [workouts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: No Content }
        "400":
          description: Invalid id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /measurements:
    get:
      operationId: listMeasurements
      tags: [measurements]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Measurement" }
    post:
      operationId: createMeasurement
      tags: [measurements]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMeasurementBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Measurement" }
        "400":
          description: Invalid request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /measurements/{id}:
    patch:
      operationId: updateMeasurement
      tags: [measurements]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeasurementBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Measurement" }
        "400":
          description: Invalid id or request body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Measurement not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteMeasurement
      tags: [measurements]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: No Content }
        "400":
          description: Invalid id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /dashboard/weight-trend:
    get:
      operationId: getWeightTrend
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WeightPoint" }

  /dashboard/weekly-mileage:
    get:
      operationId: getWeeklyMileage
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WeeklyMileagePoint" }

  /dashboard/equipment-usage:
    get:
      operationId: getEquipmentUsage
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EquipmentUsage" }

  /dashboard/equipment-phase-summary:
    get:
      operationId: getEquipmentPhaseSummary
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EquipmentPhaseSummary" }

  /dashboard/long-run-progression:
    get:
      operationId: getLongRunProgression
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LongRunPoint" }

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Workout" }

  /race-week:
    get:
      operationId: getRaceWeek
      tags: [race-week]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RaceWeekStatus" }

  /race-week/checklist/{itemId}:
    put:
      operationId: setRaceWeekChecklistItem
      tags: [race-week]
      parameters:
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetRaceWeekChecklistItemBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RaceWeekChecklistItem" }
        "400":
          description: Invalid item id or body
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                  - $ref: "#/components/schemas/ValidationError"
        "404":
          description: Checklist item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Error:
      type: object
      description: Standard error envelope returned for non-validation 4xx failures (e.g. invalid id, not found).
      required: [error]
      properties:
        error: { type: string }

    ValidationError:
      type: object
      description: Error envelope returned when a request body or query fails Zod validation. The `error` field is the structured payload produced by `zodError.flatten()`.
      required: [error]
      properties:
        error:
          type: object
          required: [formErrors, fieldErrors]
          properties:
            formErrors:
              type: array
              items: { type: string }
            fieldErrors:
              type: object
              additionalProperties:
                type: array
                items: { type: string }

    PlanDay:
      type: object
      required:
        [
          id,
          week,
          phase,
          date,
          day,
          equipment,
          description,
          sessionType,
          isRest,
          totalLoad,
          isCustomized,
          customizedFields,
        ]
      properties:
        id: { type: integer }
        week: { type: integer }
        phase: { type: string }
        date: { type: string }
        day: { type: string }
        strengthLoad: { type: number, nullable: true }
        equipment: { type: string }
        description: { type: string }
        cardioMin: { type: number, nullable: true }
        distanceMi: { type: number, nullable: true }
        pace: { type: string, nullable: true }
        sessionType: { type: string }
        isRest: { type: boolean }
        totalLoad: { type: number }
        isCustomized:
          type: boolean
          description: True when this day's prescription differs from the originally-seeded snapshot (i.e. it has been edited or swapped).
        customizedFields:
          type: array
          items: { type: string }
          description: camelCase field names whose current value differs from the seeded snapshot. Empty when isCustomized is false.

    UpdatePlanDayBody:
      type: object
      description: Editable fields for a planned (prescribed) workout. Date, day, week, and phase are immutable - use the swap endpoint to move sessions between days (within the same week or across weeks).
      properties:
        sessionType: { type: string }
        equipment: { type: string }
        description: { type: string }
        distanceMi: { type: number, nullable: true }
        cardioMin: { type: number, nullable: true }
        pace: { type: string, nullable: true }
        strengthLoad: { type: number, nullable: true }
        totalLoad: { type: number }
        isRest: { type: boolean }

    SwapPlanDayBody:
      type: object
      required: [withDayId]
      properties:
        withDayId:
          type: integer
          description: id of the partner plan_day to swap session content with. May be in the same week or in any other week of the plan.

    SwapPlanDayResponse:
      type: object
      required: [from, to, weeksAffected, phaseChanged]
      properties:
        from: { $ref: "#/components/schemas/PlanDay" }
        to: { $ref: "#/components/schemas/PlanDay" }
        weeksAffected:
          type: array
          description: Plan-week numbers whose aggregates were recomputed by this swap. One element for an in-week swap, two for a cross-week swap.
          items: { type: integer }
        phaseChanged:
          type: boolean
          description: True when the swap moved sessions across a phase boundary (the two days started out in different phases).

    ResetPlanWeekResponse:
      type: object
      required: [week, daysReset, daysTotal]
      properties:
        week: { type: integer }
        daysReset:
          type: integer
          description: Number of plan days that actually had a seed snapshot to restore from. Untouched days are not counted.
        daysTotal:
          type: integer
          description: Total number of plan days in the week (including untouched ones).
        undoToken:
          type: string
          nullable: true
          description: Short-lived token that can be passed to POST /plan/reset/undo to restore the just-wiped customizations. Null when nothing was reset (i.e. daysReset is 0). Expires after roughly 30 seconds.
        undoExpiresInSeconds:
          type: integer
          nullable: true
          description: Approximate number of seconds the undoToken will remain valid for. Null when undoToken is null.

    ResetPlanResponse:
      type: object
      required: [weeksReset, daysReset, daysTotal]
      properties:
        weeksReset:
          type: integer
          description: Number of weeks that contained at least one previously-edited plan day.
        daysReset:
          type: integer
          description: Number of plan days that actually had a seed snapshot to restore from. Untouched days are not counted.
        daysTotal:
          type: integer
          description: Total number of plan days across the entire plan (including untouched ones).
        undoToken:
          type: string
          nullable: true
          description: Short-lived token that can be passed to POST /plan/reset/undo to restore the just-wiped customizations. Null when nothing was reset (i.e. daysReset is 0). Expires after roughly 30 seconds.
        undoExpiresInSeconds:
          type: integer
          nullable: true
          description: Approximate number of seconds the undoToken will remain valid for. Null when undoToken is null.

    FullResetPlanResponse:
      type: object
      required:
        [
          weeksSeeded,
          daysSeeded,
          workoutsWiped,
          measurementsWiped,
          measurementsSeeded,
          checklistItemsWiped,
          undoSnapshotsWiped,
        ]
      properties:
        weeksSeeded:
          type: integer
          description: Number of plan_weeks rows reinserted from the canonical generator (52 for the standard campaign).
        daysSeeded:
          type: integer
          description: Number of plan_days rows reinserted from the canonical generator (364 for the standard campaign).
        workoutsWiped:
          type: integer
          description: Number of logged workout rows that were deleted by the reset.
        measurementsWiped:
          type: integer
          description: Number of measurements rows that were deleted by the reset (includes the baseline row, which is then reinserted from the seed).
        measurementsSeeded:
          type: integer
          description: Number of baseline measurements rows reinserted from the seed (1 for the standard campaign).
        checklistItemsWiped:
          type: integer
          description: Number of race-week checklist rows that were deleted by the reset.
        undoSnapshotsWiped:
          type: integer
          description: Number of pending reset-undo snapshots that were dropped (so a stale Undo can't restore deleted state after the full reset).

    UndoPlanResetBody:
      type: object
      required: [undoToken]
      properties:
        undoToken:
          type: string
          description: Token previously returned by POST /plan/weeks/{week}/reset or POST /plan/reset.

    UndoPlanResetResponse:
      type: object
      required: [daysRestored, weeksAffected]
      properties:
        daysRestored:
          type: integer
          description: Number of plan days whose pre-reset customizations were restored.
        weeksAffected:
          type: array
          items: { type: integer }
          description: Plan-week numbers whose aggregates were recomputed by the undo.

    PlanWeek:
      type: object
      required:
        [
          week,
          phase,
          startDate,
          endDate,
          plannedTotalLoad,
          plannedMiles,
          longRunMi,
        ]
      properties:
        week: { type: integer }
        phase: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        plannedStrength: { type: number, nullable: true }
        plannedCardio: { type: number, nullable: true }
        plannedTotalLoad: { type: number }
        plannedMiles: { type: number }
        longRunMi: { type: number }
        actualMiles: { type: number, nullable: true }
        completedSessions: { type: integer, nullable: true }
        totalSessions: { type: integer, nullable: true }
        missedSessions: { type: integer, nullable: true }

    PlanDayWithSuggestions:
      allOf:
        - $ref: "#/components/schemas/PlanDay"
        - type: object
          properties:
            suggestions:
              allOf:
                - $ref: "#/components/schemas/WorkoutSuggestions"
              nullable: true

    PlanWeekDetail:
      allOf:
        - $ref: "#/components/schemas/PlanWeek"
        - type: object
          required: [days]
          properties:
            days:
              type: array
              items: { $ref: "#/components/schemas/PlanDayWithSuggestions" }

    PlanOverview:
      type: object
      required:
        [
          currentWeek,
          currentPhase,
          totalWeeks,
          weeksRemaining,
          raceDate,
          startDate,
          startWeight,
          currentWeight,
          goalWeight,
        ]
      properties:
        currentWeek: { type: integer }
        currentPhase: { type: string }
        totalWeeks: { type: integer }
        weeksRemaining: { type: integer }
        raceDate: { type: string }
        startDate: { type: string }
        startWeight: { type: number }
        currentWeight: { type: number, nullable: true }
        goalWeight: { type: number }
        weeklyMilesTarget: { type: number }
        longRunTarget: { type: number }

    TodayPlan:
      type: object
      required: [date, hasPlan, loggedWorkouts]
      properties:
        date: { type: string }
        hasPlan: { type: boolean }
        plan:
          allOf:
            - $ref: "#/components/schemas/PlanDay"
          nullable: true
        loggedWorkouts:
          type: array
          description: All workouts logged for today, ordered by timeOfDay (AM, PM, Other, then untagged) and then createdAt ascending. Empty when nothing has been logged yet.
          items: { $ref: "#/components/schemas/Workout" }
        suggestions:
          allOf:
            - $ref: "#/components/schemas/WorkoutSuggestions"
          nullable: true
        daysUntilStart:
          type: integer
          nullable: true
          description: Number of days from today until the first scheduled (non-rest) plan day. Populated only when today is before that first session; null once the campaign has started. Lets the UI render a "campaign starts in N days" countdown during the pre-launch window.
        firstSession:
          allOf:
            - $ref: "#/components/schemas/PlanDay"
          nullable: true
          description: Preview of the first scheduled (non-rest) plan day. Populated alongside daysUntilStart only when today is before that session; null once the campaign has started.

    WorkoutSuggestions:
      type: object
      required: [sampleSize]
      properties:
        rpe: { type: integer, nullable: true }
        avgHr: { type: integer, nullable: true }
        pace: { type: string, nullable: true }
        paceSource:
          type: string
          enum: [plan, history]
          nullable: true
          description: Where the suggested pace came from. "plan" if it was prescribed by the plan day, "history" if it was averaged from recent comparable sessions. Null when no pace suggestion is available.
        sampleSize: { type: integer }

    Workout:
      type: object
      required: [id, date, equipment, sessionType, createdAt]
      properties:
        id: { type: integer }
        planDayId: { type: integer, nullable: true }
        date: { type: string }
        equipment: { type: string }
        sessionType: { type: string }
        durationMin: { type: number, nullable: true }
        distanceMi: { type: number, nullable: true }
        pace: { type: string, nullable: true }
        avgHr: { type: integer, nullable: true }
        rpe: { type: integer, nullable: true }
        strengthLoad: { type: number, nullable: true }
        totalLoad: { type: number, nullable: true }
        notes: { type: string, nullable: true }
        timeOfDay:
          type: string
          enum: [AM, PM, Other]
          nullable: true
          description: Optional tag used to order and label same-day sessions. AM sorts before PM, PM before Other; rows with no tag fall back to createdAt order.
        modality:
          type: string
          enum: [Cardio, Strength, Mixed]
          nullable: true
          description: High-level modality of the session. Lets the user explicitly mark a workout as cardio, strength, or mixed independent of the more granular sessionType. Nullable for rows logged before this field existed.
        createdAt: { type: string, format: date-time }

