      type: object
      required: [date, weight]
      properties:
        date: { type: string }
        weight: { type: number }

    WeeklyMileagePoint:
      type: object
      required: [week, plannedMiles, actualMiles]
      properties:
        week: { type: integer }
        startDate: { type: string }
        phase: { type: string }
        plannedMiles: { type: number }
        actualMiles: { type: number }

    EquipmentUsage:
      type: object
      required:
        [
          equipment,
          sessions,
          totalMinutes,
          totalLoad,
          totalDistance,
          plannedSessions,
          plannedMinutes,
          plannedLoad,
          plannedDistance,
          plannedToDateSessions,
          plannedToDateMinutes,
          plannedToDateLoad,
          plannedToDateDistance,
        ]
      properties:
        equipment: { type: string }
        sessions: { type: integer }
        totalMinutes: { type: number }
        totalLoad: { type: number }
        totalDistance: { type: number }
        plannedSessions: { type: integer }
        plannedMinutes: { type: number }
        plannedLoad: { type: number }
        plannedDistance: { type: number }
        plannedToDateSessions:
          type: integer
          description: Planned non-rest sessions for this machine on or before today. Use to compare actuals against the share of the plan that should have happened so far rather than the full campaign.
        plannedToDateMinutes:
          type: number
          description: Planned cardio minutes for this machine on or before today.
        plannedToDateLoad:
          type: number
          description: Planned total load for this machine on or before today.
        plannedToDateDistance:
          type: number
          description: Planned distance (mi) for this machine on or before today.

    EquipmentPhaseSummary:
      type: object
      description: Phase-by-phase planned and actual session counts per machine. `phases` is the ordered list of phase names across the campaign; each row's `counts` and `actualCounts` arrays are parallel to `phases`.
      required: [phases, rows]
      properties:
        phases:
          type: array
          items: { type: string }
        rows:
          type: array
          items: { $ref: "#/components/schemas/EquipmentPhaseRow" }

    EquipmentPhaseRow:
      type: object
      required: [equipment, counts, actualCounts, plannedToDateCounts, total, actualTotal]
      properties:
        equipment: { type: string }
        counts:
          type: array
          description: Planned non-rest sessions per phase, in the same order as `phases`.
          items: { type: integer }
        actualCounts:
          type: array
          description: Logged workouts per phase (matched by workout date falling inside the phase's plan weeks), in the same order as `phases`.
          items: { type: integer }
        plannedToDateCounts:
          type: array
          description: Planned non-rest sessions per phase whose date is on or before today, in the same order as `phases`. Use to detect phases the athlete has fallen behind on (compare `actualCounts[i]` against `plannedToDateCounts[i]`). A value of 0 means the phase is entirely in the future and should not be flagged.
          items: { type: integer }
        total: { type: integer }
        actualTotal:
          type: integer
          description: Sum of `actualCounts` across all phases.

    LongRunPoint:
      type: object
      required: [week, plannedMi, actualMi]
      properties:
        week: { type: integer }
        date: { type: string }
        phase: { type: string }
        plannedMi: { type: number }
        actualMi: { type: number }

